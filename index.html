<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>kavarch — built different.</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --orange: #ff5500; 
            --grid-size: 40px; 
            --grid-line: rgba(0, 0, 0, 0.12);
            --sidebar-w: 400px; 
            --header-h-mobile: 120px;
            --stroke: 2px;
            --row-h-desktop: 550px;
        }

        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: lowercase !important; -webkit-font-smoothing: antialiased; }
        html, body { width: 100%; height: 100%; background-color: var(--bg); overflow-x: hidden; }

        /* FIXED BACKGROUND GRID (iPhone Friendly) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px), 
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            z-index: -1;
            pointer-events: none;
        }

        body { font-family: 'Jost', sans-serif; color: var(--text); cursor: crosshair; display: block; }
        .logo-text { letter-spacing: -2px; line-height: 1; color: black !important; text-decoration: none !important; display: inline-block; }
        .logo-text .kav { font-weight: 600; } .logo-text .arch { font-weight: 300; }
        
        /* TYPOGRAPHY */
        .mono { font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
        .med { font-weight: 500; }
        .light { font-weight: 300; }

        /* LANGUAGE SWITCH */
        .lang-switch { font-family: 'Space Mono', monospace; font-size: 0.7rem; display: inline-flex; align-items: baseline; cursor: pointer; user-select: none; padding: 10px 0; }
        .lang-btn { opacity: 0.2; transition: 0.3s; pointer-events: none; }
        .lang-btn.active { opacity: 1; color: var(--orange); font-weight: 700; }
        .lang-switch .slash { opacity: 0.2; margin: 0 1px; }

        /* SIDEBAR */
        aside {
            width: var(--sidebar-w); height: 100vh; position: fixed; left: 0; top: 0;
            border-right: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; z-index: 100;
        }
        .desktop-logo-frame {
            width: 100%; height: 180px; border-bottom: var(--stroke) solid var(--text);
            display: flex; align-items: center; justify-content: center; font-size: 3.8rem;
            transition: 0.2s; cursor: pointer; background: white;
        }
        .desktop-logo-frame:hover { background: var(--orange); }
        .desktop-logo-frame:hover .logo-text, .desktop-logo-frame:hover .logo-text span { color: white !important; }
        .sidebar-content { padding: var(--grid-size); flex-grow: 1; overflow-y: auto; }
        .sidebar-section { margin-bottom: 40px; }

        /* MAIN & FEED */
        main { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); position: relative; z-index: 5; }
        .meta-strip {
            height: 80px; padding: 0 var(--grid-size); border-bottom: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Space Mono', monospace; font-size: 0.7rem; position: sticky; top: 0; z-index: 50;
        }

        /* PROJECTS */
        .project-row { display: flex; width: 100%; height: var(--row-h-desktop); border-bottom: var(--stroke) solid var(--text); background: transparent; align-items: stretch; }
        .project-row:nth-of-type(even) { flex-direction: row-reverse; }
        .project-text, .slider-container { width: 50%; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .project-text { padding: var(--grid-size); background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(2px); }
        .project-row:nth-of-type(odd) .project-text { border-right: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) .project-text { border-left: var(--stroke) solid var(--text); }
        .project-text h2 { font-size: 4.5vw; font-weight: 500; line-height: 0.9; margin-bottom: 25px; }

        /* SLIDER */
        .slider-container { position: relative; background: #eee; touch-action: pan-y; }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; }
        .slide-img { min-width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; pointer-events: none; }
        .slider-container:hover .slide-img { filter: grayscale(0); }
        
        .slider-nav { position: absolute; inset: 0; display: flex; z-index: 10; pointer-events: none; }
        .nav-zone { width: 60px; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; cursor: pointer; pointer-events: auto; }
        .slider-container:hover .nav-zone { opacity: 1; }
        .nav-label { background: var(--orange); color: white; font-family: 'Space Mono'; padding: 10px 15px; font-weight: 700; font-size: 1rem; }

        /* Lightbox Trigger Area */
        .middle-click-trigger { position: absolute; inset: 0 60px; z-index: 5; cursor: zoom-in; pointer-events: auto; }

        /* LIGHTBOX POPUP */
        #lightbox {
            position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; border: var(--stroke) solid black; background: white; }
        .lightbox-close { position: absolute; top: 40px; right: 40px; font-family: 'Space Mono'; cursor: pointer; font-weight: 700; background: var(--orange); color: white; padding: 10px 20px; z-index: 5001; }
        .lightbox-nav { position: absolute; bottom: 40px; display: flex; gap: 40px; font-family: 'Space Mono'; font-weight: 700; font-size: 1.2rem; cursor: pointer; }

        /* MOBILE HEADER */
        header {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h-mobile);
            background: white; border-bottom: var(--stroke) solid var(--text); z-index: 3000;
            padding: 0 0 0 25px; justify-content: space-between; align-items: center;
        }
        #info-btn { 
            background: var(--orange); color: white; border: none; height: 100%; width: 100px; 
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.8rem; 
            border-left: var(--stroke) solid var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* GAME LAYER */
        #game-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .game-token { position: absolute; width: var(--grid-size); height: var(--grid-size); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono'; font-weight: 700; font-size: 1.2rem; }

        @media (max-width: 1100px) {
            aside { display: none; } header { display: flex; }
            main { margin-left: 0; width: 100%; margin-top: var(--header-h-mobile); }
            .project-row { flex-direction: column !important; height: auto; border-bottom: none; }
            .project-text, .slider-container { width: 100%; border: none !important; }
            .project-text { order: 1; padding: 40px 25px; border-bottom: var(--stroke) solid var(--text) !important; min-height: 350px; }
            .slider-container { order: 2; height: 450px; border-bottom: var(--stroke) solid var(--text) !important; }
            .nav-zone, .middle-click-trigger { display: none; } /* Mobile: Swipe only */
            .meta-strip { display: none; }
        }
    </style>
</head>
<body>

    <div id="game-layer"></div>

    <header>
        <div class="mobile-logo logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        <div class="header-controls">
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <button id="info-btn" onclick="togglePopup()">[info]</button>
        </div>
    </header>

    <div id="mobile-popup" style="display:none; position:fixed; top:var(--header-h-mobile); left:0; width:100%; height:calc(100vh - var(--header-h-mobile)); background:white; z-index:2000; padding:40px 25px; overflow-y:auto; padding-bottom: calc(40px + env(safe-area-inset-bottom));">
        <div class="sidebar-info-container"></div>
    </div>

    <aside>
        <div class="desktop-logo-frame" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <div class="logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        </div>
        <div class="sidebar-content"><div class="sidebar-info-container"></div></div>
    </aside>

    <main>
        <div class="meta-strip">
            <div id="header-log-tag"></div>
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <span id="clock" style="font-family: 'Space Mono'; font-size: 0.7rem;">00:00:00</span>
        </div>

        <section class="hero">
            <h1 style="font-size: 11vw; font-weight: 500; line-height: 0.85; padding: 120px var(--grid-size); border-bottom: var(--stroke) solid black;">built<br><span style="color: var(--orange);">different.</span></h1>
        </section>

        <div id="project-feed"></div>

        <footer style="padding: var(--grid-size); background: white; display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.7rem; border-top: var(--stroke) solid black; position: relative; z-index: 100;">
            <span id="footer-status"></span>
            <span id="footer-copy"></span>
            <span id="coords">x: 000 y: 000</span>
        </footer>
    </main>

    <div id="lightbox">
        <div class="lightbox-close" onclick="closeLightbox()">close_x</div>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-nav">
            <span onclick="changeLightbox(-1)">&lt; prev</span>
            <span onclick="changeLightbox(1)">next &gt;</span>
        </div>
    </div>

    <script>
        let globalContent = { info: null, header: null, footer: null };
        let projectData = [];
        let currentLang = 'en';
        let currentPlayer = 'x';
        let board = {};
        let activeLightboxProject = null;
        let activeLightboxIndex = 0;

        // 1. DYNAMIC CONTENT LOADING (JSON Compatible)
        async function loadSiteData() {
            try {
                const [info, header, footer] = await Promise.all([
                    fetch('content_info.json').then(r => r.json()),
                    fetch('content_header.json').then(r => r.json()),
                    fetch('content_footer.json').then(r => r.json())
                ]);
                globalContent = { info, header, footer };
                updateUI();
                initFeed();
            } catch (e) { console.error("Data error", e); }
        }

        function updateUI() {
            const lang = currentLang;
            const info = globalContent.info;
            if (!info) return;

            const html = `
                <div class="sidebar-section">
                    <h3 class="mono">01_about</h3>
                    <p class="light">${info.about[lang]}</p>
                </div>
                <div class="sidebar-section">
                    <h3 class="mono">02_team</h3>
                    ${info.team.map(m => `
                        <div style="margin-bottom:25px">
                            <span class="med" style="font-size:1.1rem; display:block;">${m.name}</span>
                            <span class="light" style="font-size:0.8rem; opacity:0.6; display:block; margin-bottom:5px;">${m.profession[lang]}</span>
                            <p class="light" style="font-size:0.9rem; opacity:0.8; line-height:1.4">${m.bio[lang]}</p>
                        </div>`).join('')}
                </div>
                <div class="sidebar-section">
                    <h3 class="mono">03_contact</h3>
                    <p class="med">${info.contact[0].title[lang]}</p>
                    <p class="light" style="margin-bottom:15px">${info.contact[0].address}</p>
                    ${info.socials.map(s => `<a href="${s.url}" class="med" style="display:block; color:black; text-decoration:underline; margin-bottom:5px;">${s.label}</a>`).join('')}
                </div>`;
            
            document.querySelectorAll('.sidebar-info-container').forEach(el => el.innerHTML = html);
            
            if (globalContent.header) {
                document.getElementById('header-log-tag').innerText = globalContent.header.log_version[lang];
                const isOpen = document.getElementById('mobile-popup').style.display === 'block';
                document.getElementById('info-btn').innerText = isOpen ? globalContent.header.close_label : globalContent.header.info_label;
            }
            if (globalContent.footer) {
                document.getElementById('footer-status').innerText = globalContent.footer.system_status;
                document.getElementById('footer-copy').innerText = globalContent.footer.copyright;
            }
        }

        // 2. PROJECT FEED (Optimized Lazy Loading)
        async function initFeed() {
            const feed = document.getElementById('project-feed');
            feed.innerHTML = '';
            projectData = [];
            
            for (let i = 1; i <= 20; i++) {
                const folder = `project${i}`;
                try {
                    const meta = await fetch(`images/${folder}/meta.json`).then(r => r.json());
                    const imgs = [];
                    // Probe for up to 10 images per project
                    for (let j = 1; j <= 10; j++) {
                        const path = `images/${folder}/${j}.jpg`;
                        const exists = await new Promise(res => {
                            const img = new Image();
                            img.onload = () => res(true);
                            img.onerror = () => res(false);
                            img.src = path;
                        });
                        if (exists) imgs.push(path); else break;
                    }

                    if (imgs.length > 0) {
                        const pObj = { id: i, meta, imgs, currentIndex: 0 };
                        projectData.push(pObj);
                        renderProjectRow(feed, pObj);
                    }
                } catch (e) { /* stop if folder not found */ }
            }
        }

        function renderProjectRow(container, project) {
            const row = document.createElement('section');
            row.className = 'project-row';
            row.innerHTML = `
                <div class="project-text">
                    <div class="mono" style="margin-bottom:10px">${project.meta.tag || ''}</div>
                    <h2 class="med">${project.meta.title}</h2>
                    <p class="light project-desc" style="font-size:1.1rem; line-height:1.5; max-width:450px; margin-bottom:30px;">
                        ${currentLang === 'en' ? project.meta.en : project.meta.tr}
                    </p>
                    <div class="mono" style="opacity:0.4; font-size:0.6rem; border-top:1px solid rgba(0,0,0,0.1); padding-top:15px;">${project.meta.specs || ''}</div>
                </div>
                <div class="slider-container" id="slider-${project.id}">
                    <div class="middle-click-trigger" onclick="openLightbox(${project.id})"></div>
                    <div class="slider-track">${project.imgs.map(src => `<img data-src="${src}" class="slide-img lazy">`).join('')}</div>
                    <div class="slider-nav">
                        <div class="nav-zone left" onclick="moveSlider(${project.id}, -1)"><span class="nav-label">&lt;</span></div>
                        <div class="nav-zone right" onclick="moveSlider(${project.id}, 1)"><span class="nav-label">&gt;</span></div>
                    </div>
                </div>`;
            container.appendChild(row);
            setupLazyLoad(row);
            setupSwipe(row.querySelector('.slider-container'), project.id);
        }

        // 3. INTERACTION LOGIC
        function setupLazyLoad(row) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.querySelectorAll('.lazy').forEach(img => {
                            img.src = img.dataset.src;
                            img.classList.remove('lazy');
                        });
                        observer.unobserve(entry.target);
                    }
                });
            }, { rootMargin: '200px' });
            observer.observe(row);
        }

        function moveSlider(id, dir) {
            const p = projectData.find(x => x.id === id);
            const container = document.getElementById(`slider-${id}`);
            const track = container.querySelector('.slider-track');
            p.currentIndex = (p.currentIndex + dir + p.imgs.length) % p.imgs.length;
            track.style.transform = `translateX(-${p.currentIndex * 100}%)`;
        }

        function setupSwipe(el, id) {
            let startX = 0;
            el.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
            el.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) moveSlider(id, diff > 0 ? 1 : -1);
            }, {passive: true});
        }

        // LIGHTBOX
        function openLightbox(id) {
            activeLightboxProject = projectData.find(p => p.id === id);
            activeLightboxIndex = activeLightboxProject.currentIndex;
            updateLightbox();
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        function updateLightbox() {
            document.getElementById('lightbox-img').src = activeLightboxProject.imgs[activeLightboxIndex];
        }
        function changeLightbox(dir) {
            activeLightboxIndex = (activeLightboxIndex + dir + activeLightboxProject.imgs.length) % activeLightboxProject.imgs.length;
            updateLightbox();
        }

        // GLOBAL UI HELPERS
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            document.querySelectorAll('.en-toggle').forEach(el => el.classList.toggle('active', currentLang === 'en'));
            document.querySelectorAll('.tr-toggle').forEach(el => el.classList.toggle('active', currentLang === 'tr'));
            updateUI();
            // Update the existing project descriptions
            projectData.forEach(p => {
                const row = document.getElementById(`slider-${p.id}`).closest('.project-row');
                row.querySelector('.project-desc').innerText = currentLang === 'en' ? p.meta.en : p.meta.tr;
            });
        }

        function togglePopup() {
            const p = document.getElementById('mobile-popup');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
            updateUI();
        }

        // XOX GAME (Grid Aligned)
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('aside, header, button, .nav-zone, .middle-click-trigger, #lightbox')) return;
            const col = Math.floor(e.clientX / 40); const row = Math.floor(e.clientY / 40);
            const key = `${col},${row}`;
            if (!board[key]) {
                board[key] = currentPlayer;
                const t = document.createElement('div'); t.className = 'game-token'; t.innerText = currentPlayer;
                t.style.left = (col * 40) + 'px'; t.style.top = (row * 40) + 'px';
                t.style.color = currentPlayer === 'x' ? 'var(--orange)' : 'black';
                document.getElementById('game-layer').appendChild(t);
                currentPlayer = (currentPlayer === 'x') ? 'o' : 'x';
            }
        });

        // SYSTEM CLOCK & COORDS
        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        window.addEventListener('mousemove', (e) => { 
            document.getElementById('coords').innerText = `x: ${String(e.clientX).padStart(3, '0')} y: ${String(e.clientY).padStart(3, '0')}`; 
        });

        loadSiteData();
    </script>
</body>
</html>
