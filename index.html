<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>kavarch — built different.</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --orange: #ff5500; 
            --grid-size: 40px; 
            --grid-line: rgba(0, 0, 0, 0.12);
            --grid-line-white: rgba(255, 255, 255, 0.08);
            --sidebar-w: 400px; 
            --header-h-mobile: 120px;
            --stroke: 2px;
            --row-h-desktop: 550px;
        }

        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: lowercase !important; -webkit-font-smoothing: antialiased; }
        html, body { width: 100%; min-height: 100%; background-color: var(--bg); margin: 0; padding: 0; }

        /* FIXED INFINITE GRID (Stabilized for all devices) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px), 
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            z-index: -1;
            pointer-events: none;
        }

        body { font-family: 'Jost', sans-serif; color: var(--text); cursor: crosshair; display: block; overflow-x: hidden; }

        .logo-text { letter-spacing: -2px; line-height: 1; color: black !important; text-decoration: none !important; display: inline-block; }
        .logo-text .kav { font-weight: 600; } .logo-text .arch { font-weight: 300; }
        
        .lang-switch { font-family: 'Space Mono', monospace; font-size: 0.7rem; display: inline-flex; align-items: baseline; cursor: pointer; user-select: none; padding: 10px 0; }
        .lang-btn { opacity: 0.2; transition: 0.3s; pointer-events: none; }
        .lang-btn.active { opacity: 1; color: var(--orange); font-weight: 700; }
        .lang-switch .slash { opacity: 0.2; margin: 0 1px; pointer-events: none; }

        .mono { font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
        .med { font-weight: 500; }
        .light { font-weight: 300; }

        /* SIDEBAR (Hidden Scroll) */
        aside {
            width: var(--sidebar-w); height: 100vh; position: fixed; left: 0; top: 0;
            border-right: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; z-index: 100;
        }
        .desktop-logo-frame {
            width: 100%; height: 180px; border-bottom: var(--stroke) solid var(--text);
            display: flex; align-items: center; justify-content: center; font-size: 3.8rem;
            transition: 0.2s; cursor: pointer; background: white;
        }
        .desktop-logo-frame:hover { background: var(--orange); }
        .desktop-logo-frame:hover .logo-text, .desktop-logo-frame:hover .logo-text span { color: white !important; }

        .sidebar-content, #mobile-popup { 
            padding: var(--grid-size); flex-grow: 1; overflow-y: auto; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .sidebar-content::-webkit-scrollbar, #mobile-popup::-webkit-scrollbar { display: none; }
        .sidebar-section { margin-bottom: 40px; }
        .contact-link { display: block; margin-top: 5px; text-decoration: underline !important; color: black !important; font-weight: 500; }

        /* MOBILE HEADER */
        header {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h-mobile);
            background: white; border-bottom: var(--stroke) solid var(--text); z-index: 3000;
            padding: 0 0 0 25px; justify-content: space-between; align-items: center;
        }
        .mobile-logo { font-size: 3rem !important; }
        .header-controls { display: flex; align-items: center; gap: 20px; height: 100%; }

        #info-btn { 
            background: var(--orange); color: white; border: none; height: 100%; width: 100px; 
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.8rem; 
            border-left: var(--stroke) solid var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #mobile-popup { 
            display: none; position: fixed; top: var(--header-h-mobile); left: 0; width: 100%; 
            height: calc(100vh - var(--header-h-mobile)); background: white; z-index: 2000; 
            padding: 40px 25px; padding-bottom: calc(140px + env(safe-area-inset-bottom));
        }

        main { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); position: relative; z-index: 5; background: transparent; }

        .meta-strip {
            height: 80px; padding: 0 var(--grid-size); border-bottom: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Space Mono', monospace; font-size: 0.7rem; position: sticky; top: 0; z-index: 50;
        }

        /* UPDATES (Videos) */
        .updates-container { display: flex; height: 400px; border-bottom: var(--stroke) solid var(--text); background: black; }
        .video-box { position: relative; width: 50%; height: 100%; overflow: hidden; border-right: var(--stroke) solid var(--text); }
        .video-box:last-child { border-right: none; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; opacity: 0.8; }
        .video-box:hover video { filter: grayscale(0); opacity: 1; transform: scale(1.05); }
        .tag { position: absolute; bottom: 20px; left: 20px; background: var(--orange); color: white; padding: 4px 12px; font-family: 'Space Mono'; font-size: 0.6rem; z-index: 10; }

        /* HERO */
        .hero { padding: 120px var(--grid-size); border-bottom: var(--stroke) solid var(--text); background: transparent; }
        .hero h1 { font-size: 11vw; font-weight: 500; line-height: 0.85; letter-spacing: -0.05em; pointer-events: none; }

        /* PROJECTS */
        .project-row { display: flex; width: 100%; height: var(--row-h-desktop); border-bottom: var(--stroke) solid var(--text); background: transparent; align-items: stretch; }
        .project-row:nth-of-type(even) { flex-direction: row-reverse; }
        .project-text, .slider-container { width: 50%; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .project-text { padding: var(--grid-size); background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(2px); }
        .project-row:nth-of-type(odd) .project-text { border-right: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) .project-text { border-left: var(--stroke) solid var(--text); }

        .project-text h2 { font-size: 4.5vw; font-weight: 500; line-height: 0.9; margin-bottom: 25px; }
        .project-desc { font-size: 1.1rem; line-height: 1.5; max-width: 450px; font-weight: 300; margin-bottom: 30px;}

        .slider-container { position: relative; background: #eee; overflow: hidden; touch-action: pan-y; }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; cursor: pointer; }
        .slide-img { min-width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; pointer-events: none; }
        .slider-container:hover .slide-img { filter: grayscale(0); }

        .slider-nav { position: absolute; inset: 0; display: flex; justify-content: space-between; align-items: center; z-index: 10; pointer-events: none; }
        .nav-zone { width: 60px; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; cursor: pointer; pointer-events: auto; }
        .slider-container:hover .nav-zone { opacity: 1; }
        .nav-label { background: var(--orange); color: white; font-family: 'Space Mono'; padding: 12px 10px; font-weight: 700; font-size: 1.2rem; }

        footer { padding: var(--grid-size); background: white; display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.7rem; z-index: 100; position: relative; border-top: none; }

        /* LIGHTBOX POPUP */
        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 5000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .lb-grid-overlay {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(var(--grid-line-white) 1px, transparent 1px), 
                linear-gradient(90deg, var(--grid-line-white) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            pointer-events: none; z-index: -1;
        }
        .lb-modal {
            position: relative; width: fit-content; max-width: 70vw; height: fit-content; max-height: 85vh;
            display: flex; align-items: center; justify-content: center;
        }
        .lb-modal img { max-width: 100%; max-height: 85vh; object-fit: contain; border: var(--stroke) solid black; background: white; }
        
        /* CLOSE X - ALIGNED TO RIGHT: 30PX */
        .lb-close { position: fixed; top: 30px; right: 30px; font-size: 2.5rem; color: var(--orange); cursor: pointer; font-family: 'Space Mono'; font-weight: 400; line-height: 1; transition: 0.2s; border: none; background: none; z-index: 5010; }
        .lb-close:hover { transform: scale(1.2); }
        
        /* NAVIGATION CONTROLS (Hover Only) */
        .lb-controls { position: fixed; inset: 0; opacity: 0; transition: 0.3s; pointer-events: none; }
        #lightbox:hover .lb-controls { opacity: 1; }

        /* Huge Clickable Zones for Navigation */
        .lb-nav-zone { position: fixed; top: 0; height: 100%; width: 50%; display: flex; align-items: center; cursor: pointer; pointer-events: auto; }
        .lb-prev-zone { left: 0; justify-content: flex-start; padding-left: 30px; }
        .lb-next-zone { right: 0; justify-content: flex-end; padding-right: 30px; } /* Aligns with X horizontally */

        /* Minimalistic Triangles */
        .lb-triangle { color: var(--orange); font-size: 1.5rem; line-height: 1; }

        .lb-dots { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; pointer-events: none; }
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; opacity: 0.3; transition: 0.3s; }
        .dot.active { opacity: 1; background: var(--orange); transform: scale(1.6); }

        /* GAME LAYER */
        #game-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .game-token { position: fixed; width: var(--grid-size); height: var(--grid-size); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono'; font-weight: 700; font-size: 1.2rem; animation: tokenIn 0.3s forwards; }
        @keyframes tokenIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.3); color: var(--orange); } }

        @media (max-width: 1100px) {
            aside { display: none; } header { display: flex; }
            main { margin-left: 0; width: 100%; margin-top: var(--header-h-mobile); }
            .updates-container { flex-direction: column; height: auto; border-bottom: var(--stroke) solid var(--text); }
            .video-box { width: 100%; height: 300px; border-right: none; border-bottom: var(--stroke) solid var(--text); }
            .video-box:last-child { border-bottom: none; }
            .project-row { flex-direction: column !important; height: auto; border-bottom: none; }
            .project-text, .slider-container { width: 100%; height: auto; border: none !important; }
            .project-text { order: 1; padding: 40px 25px; border-bottom: var(--stroke) solid var(--text) !important; min-height: 350px; }
            .slider-container { order: 2; height: 450px; border-bottom: var(--stroke) solid var(--text) !important; }
            .nav-zone { display: none; } 
            .meta-strip { display: none; } .hero h1 { font-size: 16vw; } .hero { border-bottom: var(--stroke) solid var(--text); }
            footer { justify-content: center; } #footer-status, #coords { display: none; }
            
            .lb-modal { max-width: 90vw; }
            .lb-close { right: 20px; top: 20px; font-size: 2rem; }
            .lb-controls { opacity: 1; }
            .lb-triangle { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div id="game-layer"></div>

    <header>
        <div class="mobile-logo logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        <div class="header-controls">
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <button id="info-btn" onclick="togglePopup()">[info]</button>
        </div>
    </header>

    <div id="mobile-popup"><div class="sidebar-info-container"></div></div>

    <aside>
        <div class="desktop-logo-frame" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <div class="logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        </div>
        <div class="sidebar-content"><div class="sidebar-info-container"></div></div>
    </aside>

    <main>
        <div class="meta-strip">
            <div id="header-log-tag"></div>
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <span id="clock" style="font-family: 'Space Mono'; font-size: 0.7rem;">00:00:00</span>
        </div>

        <section class="updates-container">
            <div class="video-box">
                <video autoplay muted loop playsinline><source src="videos/video1.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_01: site_friction</span></div>
            </div>
            <div class="video-box">
                <video autoplay muted loop playsinline><source src="videos/video2.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_02: structural_void</span></div>
            </div>
        </section>

        <section class="hero">
            <h1>built<br><span style="color: var(--orange);">different.</span></h1>
        </section>

        <div id="project-feed"></div>

        <footer>
            <span id="footer-status"></span>
            <span id="footer-copy"></span>
            <span id="coords">x: 00
