<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>kavarch — built different.</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --orange: #ff5500; 
            --grid-size: 40px; 
            --grid-line: rgba(0, 0, 0, 0.12);
            --sidebar-w: 400px; 
            --header-h-mobile: 120px;
            --stroke: 2px;
            --row-h-desktop: 550px;
        }

        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: lowercase !important; -webkit-font-smoothing: antialiased; }
        html, body { width: 100%; height: 100%; background-color: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }

        /* FIX: iPhone Background Grid Alignment */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            pointer-events: none;
            z-index: -1;
        }

        body { font-family: 'Jost', sans-serif; color: var(--text); cursor: crosshair; display: block; }

        .logo-text { letter-spacing: -2px; line-height: 1; color: black !important; text-decoration: none !important; display: inline-block; }
        .logo-text .kav { font-weight: 600; } .logo-text .arch { font-weight: 300; }
        a { text-decoration: none !important; }

        /* TYPOGRAPHY */
        .mono { font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
        .med { font-weight: 500; }
        .light { font-weight: 300; }

        /* HEADER LOG TAG */
        #header-log-tag { font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 400; color: var(--text); transition: color 0.3s; }

        /* SIDEBAR & HEADER */
        aside {
            width: var(--sidebar-w); height: 100vh; position: fixed; left: 0; top: 0;
            border-right: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; z-index: 100;
        }
        .desktop-logo-frame {
            width: 100%; height: 180px; border-bottom: var(--stroke) solid var(--text);
            display: flex; align-items: center; justify-content: center; font-size: 3.8rem;
            transition: 0.2s; cursor: pointer; background: white;
        }
        .desktop-logo-frame:hover { background: var(--orange); }
        .desktop-logo-frame:hover .logo-text, .desktop-logo-frame:hover .logo-text span { color: white !important; }

        .sidebar-content { padding: var(--grid-size); flex-grow: 1; overflow-y: auto; }
        .sidebar-section { margin-bottom: 40px; }
        .name-style { font-size: 1.1rem; display: block; font-weight: 500; margin-bottom: 4px; }
        .team-member-block { margin-bottom: 25px; }
        .contact-link { display: block; margin-top: 5px; text-decoration: underline !important; color: black; font-weight: 500; }

        header {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h-mobile);
            background: white; border-bottom: var(--stroke) solid var(--text); z-index: 3000;
            padding: 0 0 0 25px; justify-content: space-between; align-items: center;
        }
        .header-controls { display: flex; align-items: center; gap: 20px; height: 100%; }

        #info-btn { 
            background: var(--orange); color: white; border: none; height: 100%; width: 100px; 
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.8rem; 
            border-left: var(--stroke) solid var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #mobile-popup { display: none; position: fixed; top: var(--header-h-mobile); left: 0; width: 100%; height: calc(100vh - var(--header-h-mobile)); background: white; z-index: 2000; padding: 40px 25px; overflow-y: auto; }

        /* MAIN FIELD */
        main { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); position: relative; z-index: 5; }
        .meta-strip {
            height: 80px; padding: 0 var(--grid-size); border-bottom: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Space Mono', monospace; font-size: 0.7rem; position: sticky; top: 0; z-index: 50;
        }

        /* UPDATES & HERO */
        .updates-container { display: flex; height: 400px; border-bottom: var(--stroke) solid var(--text); background: black; }
        .video-box { position: relative; width: 50%; height: 100%; overflow: hidden; border-right: var(--stroke) solid var(--text); }
        .video-box:last-child { border-right: none; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; opacity: 0.8; }
        .video-box:hover video { filter: grayscale(0); opacity: 1; transform: scale(1.05); }
        .tag { position: absolute; bottom: 20px; left: 20px; background: var(--orange); color: white; padding: 4px 12px; font-family: 'Space Mono'; font-size: 0.6rem; z-index: 10; }
        .hero { padding: 120px var(--grid-size); border-bottom: var(--stroke) solid var(--text); }
        .hero h1 { font-size: 11vw; font-weight: 500; line-height: 0.85; letter-spacing: -0.05em; pointer-events: none; }

        /* PROJECT SLIDER */
        .project-row { display: flex; width: 100%; height: var(--row-h-desktop); border-bottom: var(--stroke) solid var(--text); align-items: stretch; }
        .project-row:nth-of-type(even) { flex-direction: row-reverse; }
        .project-text, .slider-container { width: 50%; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; }
        .project-text { padding: var(--grid-size); background: rgba(255, 255, 255, 0.75); }
        .project-row:nth-of-type(odd) .project-text { border-right: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) .project-text { border-left: var(--stroke) solid var(--text); }

        .project-text h2 { font-size: 4.5vw; font-weight: 500; line-height: 0.9; margin-bottom: 25px; }
        .project-desc { font-size: 1.1rem; line-height: 1.5; max-width: 450px; font-weight: 300; margin-bottom: 30px; }

        .slider-container { position: relative; background: #eee; overflow: hidden; touch-action: pan-y; }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); cursor: zoom-in; }
        .slide-img { min-width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; }
        .slider-container:hover .slide-img { filter: grayscale(0); }

        .slider-nav { position: absolute; inset: 0; display: flex; justify-content: space-between; align-items: center; z-index: 10; pointer-events: none; }
        .nav-zone { width: 60px; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; cursor: pointer; pointer-events: auto; }
        .slider-container:hover .nav-zone { opacity: 1; }
        .nav-label { background: var(--orange); color: white; font-family: 'Space Mono'; padding: 12px 8px; font-weight: 700; font-size: 1.2rem; }

        /* LIGHTBOX POPUP */
        #lightbox { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; border: var(--stroke) solid black; }
        .lightbox-close { position: absolute; top: 40px; right: 40px; font-family: 'Space Mono'; cursor: pointer; font-weight: 700; background: var(--orange); color: white; padding: 10px 20px; z-index: 5001; }
        .lightbox-nav { position: absolute; bottom: 40px; display: flex; gap: 40px; font-family: 'Space Mono'; font-weight: 700; font-size: 1.2rem; cursor: pointer; }

        /* FOOTER */
        footer { padding: var(--grid-size); background: white; display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.7rem; border-top: var(--stroke) solid var(--text); z-index: 100; position: relative; }

        /* XOX GAME */
        #game-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .game-token { position: absolute; width: var(--grid-size); height: var(--grid-size); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono'; font-weight: 700; font-size: 1.2rem; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 1100px) {
            aside { display: none; } header { display: flex; }
            main { margin-left: 0; width: 100%; margin-top: var(--header-h-mobile); }
            .updates-container { flex-direction: column; height: auto; }
            .video-box { width: 100%; height: 300px; border-right: none; border-bottom: var(--stroke) solid var(--text); }
            .project-row { flex-direction: column !important; height: auto; border-bottom: none; }
            .project-text, .slider-container { width: 100%; height: auto; border: none !important; }
            .project-text { order: 1; padding: 40px 25px; border-bottom: var(--stroke) solid var(--text) !important; min-height: 350px; }
            .slider-container { order: 2; height: 450px; border-bottom: var(--stroke) solid var(--text) !important; }
            .nav-zone { display: none; } /* Hide buttons on mobile, use swipe */
            .hero h1 { font-size: 16vw; }
        }
    </style>
</head>
<body>

    <div id="game-layer"></div>

    <header>
        <div class="mobile-logo logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        <div class="header-controls">
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <button id="info-btn" onclick="togglePopup()">[info]</button>
        </div>
    </header>

    <div id="mobile-popup"><div class="sidebar-info-container"></div></div>

    <aside>
        <div class="desktop-logo-frame" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <div class="logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        </div>
        <div class="sidebar-content"><div class="sidebar-info-container"></div></div>
    </aside>

    <main>
        <div class="meta-strip">
            <div id="header-log-tag"></div>
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <span id="clock" style="font-family: 'Space Mono'; font-size: 0.7rem;">00:00:00</span>
        </div>

        <section class="updates-container">
            <div class="video-box">
                <video autoplay muted loop playsinline><source src="videos/video1.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_01: site_friction</span></div>
            </div>
            <div class="video-box">
                <video autoplay muted loop playsinline><source src="videos/video2.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_02: structural_void</span></div>
            </div>
        </section>

        <section class="hero">
            <h1>built<br><span style="color: var(--orange);">different.</span></h1>
        </section>

        <div id="project-feed"></div>

        <footer>
            <span id="footer-status"></span>
            <span id="footer-copy"></span>
            <span id="coords">x: 000 y: 000</span>
        </footer>
    </main>

    <div id="lightbox">
        <div class="lightbox-close" onclick="closeLightbox()">close_x</div>
        <img id="lightbox-img" src="">
        <div class="lightbox-nav">
            <span onclick="changeLightbox(-1)">&lt; prev</span>
            <span onclick="changeLightbox(1)">next &gt;</span>
        </div>
    </div>

    <script>
        let globalContent = { info: null, header: null, footer: null };
        let currentLang = 'en';
        let currentPlayer = 'x'; 
        let board = {}; 
        let gameActive = true;
        let projectList = [];
        let currentLightboxProject = null;
        let currentLightboxIndex = 0;

        // 1. DYNAMIC CONTENT LOADING
        async function loadDynamicContent() {
            try {
                const [info, header, footer] = await Promise.all([
                    fetch('content_info.json').then(r => r.json()),
                    fetch('content_header.json').then(r => r.json()),
                    fetch('content_footer.json').then(r => r.json())
                ]);
                globalContent = { info, header, footer };
                updateUI();
                initFeed();
            } catch (e) { console.error("Error loading JSON", e); }
        }

        function updateUI() {
            const lang = currentLang;
            const info = globalContent.info;
            if (!info) return;

            let html = `
                <div class="sidebar-section"><h3 class="mono">01_about</h3><p class="light">${info.about[lang]}</p></div>
                <div class="sidebar-section"><h3 class="mono">02_team</h3>
                    ${info.team.map(m => `
                        <div class="team-member-block">
                            <span class="name-style med">${m.name}</span>
                            <span class="profession light">${m.profession[lang]}</span>
                            <p class="bio light">${m.bio[lang]}</p>
                        </div>`).join('')}
                </div>
                <div class="sidebar-section"><h3 class="mono">03_contact</h3>
                    ${info.contact.map(office => `<div class="office-block"><span class="name-style med">${office.title[lang]}</span><p class="light">${office.address}</p></div>`).join('')}
                </div>
                <div class="sidebar-section">${info.socials.map(soc => `<a href="${soc.url}" target="_blank" class="contact-link med">${soc.label}</a>`).join('')}</div>
            `;
            document.querySelectorAll('.sidebar-info-container').forEach(el => el.innerHTML = html);

            if (globalContent.header) {
                document.getElementById('header-log-tag').innerText = globalContent.header.log_version[lang];
                const infoBtn = document.getElementById('info-btn');
                const isVisible = document.getElementById('mobile-popup').style.display === 'block';
                infoBtn.innerText = isVisible ? globalContent.header.close_label : globalContent.header.info_label;
            }
            if (globalContent.footer) {
                document.getElementById('footer-status').innerText = globalContent.footer.system_status;
                document.getElementById('footer-copy').innerText = globalContent.footer.copyright;
            }
        }

        // 2. PROJECT FEED (Optimized)
        const EXTENSIONS = ['jpg', 'jpeg', 'png', 'webp'];
        async function probeImage(folder, index) {
            for (const ext of EXTENSIONS) {
                const url = `images/${folder}/${index}.${ext}`;
                const exists = await new Promise(res => {
                    const img = new Image();
                    img.onload = () => res(true);
                    img.onerror = () => res(false);
                    img.src = url;
                });
                if (exists) return url;
            } return null;
        }

        async function initFeed() {
            const feed = document.getElementById('project-feed');
            feed.innerHTML = '';
            projectList = [];

            for (let pNum = 1; pNum <= 20; pNum++) {
                const folder = `project${pNum}`;
                const firstImg = await probeImage(folder, 1);
                if (firstImg) {
                    let meta = { tag: `[log_0${pNum}]`, title: `project_log_${pNum}`, en: `Case study.`, tr: `Vaka çalışması.`, specs: `Loc: TR // 2025` };
                    try { const res = await fetch(`images/${folder}/meta.json`); if (res.ok) meta = await res.json(); } catch (e) {}

                    let imgs = [firstImg];
                    for (let iNum = 2; iNum <= 10; iNum++) {
                        const path = await probeImage(folder, iNum);
                        if (path) imgs.push(path); else break;
                    }

                    const pObj = { id: pNum, meta, imgs, cur: 0 };
                    projectList.push(pObj);

                    const row = document.createElement('section');
                    row.className = 'project-row';
                    row.innerHTML = `
                        <div class="project-text">
                            <div class="mono">${meta.tag}</div>
                            <h2 class="med">${meta.title}</h2>
                            <p class="light project-desc">${currentLang === 'en' ? meta.en : meta.tr}</p>
                            <div class="mono" style="opacity:0.4; font-size:0.6rem; border-top:1px solid rgba(0,0,0,0.1); padding-top:15px;">${meta.specs}</div>
                        </div>
                        <div class="slider-container" id="slider-${pNum}">
                            <div class="slider-track">${imgs.map(s => `<img data-src="${s}" class="slide-img lazy">`).join('')}</div>
                            <div class="slider-nav">
                                <div class="nav-zone" onclick="moveSlide(${pNum}, -1)"><span class="nav-label">&lt;</span></div>
                                <div class="nav-zone" onclick="moveSlide(${pNum}, 1)"><span class="nav-label">&gt;</span></div>
                            </div>
                        </div>`;
                    feed.appendChild(row);
                    setupLazyLoad(row);
                    setupSwipe(row.querySelector('.slider-container'), pNum);
                    row.querySelector('.slider-track').onclick = () => openLightbox(pNum);
                }
            }
        }

        // 3. LAZY LOADING & SLIDER
        function setupLazyLoad(row) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.querySelectorAll('.lazy').forEach(img => { img.src = img.dataset.src; img.classList.remove('lazy'); });
                        observer.unobserve(entry.target);
                    }
                });
            }, { rootMargin: '200px' });
            observer.observe(row);
        }

        function moveSlide(id, dir) {
            const p = projectList.find(x => x.id === id);
            const container = document.getElementById(`slider-${id}`);
            const track = container.querySelector('.slider-track');
            p.cur = (p.cur + dir + p.imgs.length) % p.imgs.length;
            track.style.transform = `translateX(-${p.cur * 100}%)`;
        }

        function setupSwipe(el, id) {
            let startX = 0;
            el.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
            el.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) moveSlide(id, diff > 0 ? 1 : -1);
            }, {passive: true});
        }

        // 4. LIGHTBOX
        function openLightbox(id) {
            if (window.innerWidth <= 1100) return; // Only desktop
            currentLightboxProject = projectList.find(x => x.id === id);
            currentLightboxIndex = currentLightboxProject.cur;
            updateLightbox();
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        function updateLightbox() {
            document.getElementById('lightbox-img').src = currentLightboxProject.imgs[currentLightboxIndex];
        }
        function changeLightbox(dir) {
            currentLightboxIndex = (currentLightboxIndex + dir + currentLightboxProject.imgs.length) % currentLightboxProject.imgs.length;
            updateLightbox();
        }

        // 5. XOX GAME (Fixed Grid Logic)
        window.addEventListener('mousedown', (e) => {
            if (!gameActive || e.target.closest('aside, header, button, .nav-zone, #lightbox')) return;
            const col = Math.floor(e.clientX / 40); const row = Math.floor(e.clientY / 40);
            const key = `${col},${row}`;
            if (!board[key]) {
                board[key] = currentPlayer;
                const t = document.createElement('div'); t.className = 'game-token'; t.innerText = currentPlayer;
                t.style.left = (col * 40) + 'px'; t.style.top = (row * 40) + 'px';
                t.style.color = currentPlayer === 'x' ? 'var(--orange)' : 'black';
                document.getElementById('game-layer').appendChild(t);
                
                if (checkWin(col, row, currentPlayer)) {
                    gameActive = false;
                    const logEl = document.getElementById('header-log-tag');
                    logEl.innerText = `[alert: winner_${currentPlayer}_detected]`;
                    logEl.style.color = 'var(--orange)';
                    logEl.style.fontWeight = '700';
                } else { currentPlayer = (currentPlayer === 'x') ? 'o' : 'x'; }
            }
        });
        function checkWin(c, r, p) {
            const dirs = [[1,0], [0,1], [1,1], [1,-1]];
            for (let [dx, dy] of dirs) {
                let path = [[c, r]];
                for (let i = 1; i < 3; i++) { if (board[`${c+(dx*i)},${r+(dy*i)}`] === p) path.push([c+(dx*i), r+(dy*i)]); else break; }
                for (let i = 1; i < 3; i++) { if (board[`${c-(dx*i)},${r-(dy*i)}`] === p) path.push([c-(dx*i), r-(dy*i)]); else break; }
                if (path.length >= 3) return true;
            } return false;
        }

        // UI HELPERS
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            document.querySelectorAll('.en-toggle').forEach(el => el.classList.toggle('active', currentLang === 'en'));
            document.querySelectorAll('.tr-toggle').forEach(el => el.classList.toggle('active', currentLang === 'tr'));
            updateUI();
            projectList.forEach(p => {
                const desc = document.querySelector(`#slider-${p.id}`).previousElementSibling.querySelector('.project-desc');
                if (desc) desc.innerText = currentLang === 'en' ? p.meta.en : p.meta.tr;
            });
        }
        function tog
