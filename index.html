<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>kavarch — built different.</title>
    
    <link rel="icon" type="image/png" href="favicon.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --orange: #ff5500; 
            --grid-size: 40px; 
            --grid-line: rgba(0, 0, 0, 0.12);
            --sidebar-w: 400px; 
            --header-h-mobile: 120px;
            --stroke: 2px;
            --row-h-desktop: 550px;
        }

        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: lowercase !important; -webkit-font-smoothing: antialiased; }
        html, body { width: 100%; min-height: 100%; background-color: var(--bg); margin: 0; padding: 0; }

        /* INFINITE BACKGROUND GRID - SYNCED WITH XOX */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            z-index: -1;
            pointer-events: none;
        }

        body { font-family: 'Jost', sans-serif; color: var(--text); cursor: crosshair; display: block; overflow-x: hidden; }
        .logo-text { letter-spacing: -2px; line-height: 1; color: black !important; text-decoration: none !important; display: inline-block; }
        .logo-text .kav { font-weight: 600; } .logo-text .arch { font-weight: 300; }
        
        .lang-switch { font-family: 'Space Mono', monospace; font-size: 0.7rem; display: inline-flex; align-items: baseline; cursor: pointer; user-select: none; padding: 10px 0; }
        .lang-btn { opacity: 0.2; transition: 0.3s; pointer-events: none; }
        .lang-btn.active { opacity: 1; color: var(--orange); font-weight: 700; }
        .lang-switch .slash { opacity: 0.2; margin: 0 1px; pointer-events: none; }

        .mono { font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
        .med { font-weight: 500; }
        .light { font-weight: 300; }

        /* SIDEBAR & POPUP */
        aside {
            width: var(--sidebar-w); height: 100vh; position: fixed; left: 0; top: 0;
            border-right: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; z-index: 100;
        }
        .desktop-logo-frame {
            width: 100%; height: 180px; border-bottom: var(--stroke) solid var(--text);
            display: flex; align-items: center; justify-content: center; font-size: 3.8rem;
            transition: 0.2s; cursor: pointer; background: white;
        }
        .desktop-logo-frame:hover { background: var(--orange); }
        .desktop-logo-frame:hover .logo-text, .desktop-logo-frame:hover .logo-text span { color: white !important; }

        .sidebar-content, #mobile-popup { 
            padding: var(--grid-size); flex-grow: 1; overflow-y: auto; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .sidebar-content::-webkit-scrollbar, #mobile-popup::-webkit-scrollbar { display: none; }

        .sidebar-section { margin-bottom: 40px; }
        .contact-link { display: block; margin-top: 5px; text-decoration: underline !important; color: black !important; font-weight: 500; }

        header {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h-mobile);
            background: white; border-bottom: var(--stroke) solid var(--text); z-index: 3000;
            padding: 0 0 0 25px; justify-content: space-between; align-items: center;
        }
        .mobile-logo { font-size: 3rem !important; }
        .header-controls { display: flex; align-items: center; gap: 20px; height: 100%; }

        #info-btn { 
            background: var(--orange); color: white; border: none; height: 100%; width: 100px; 
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.8rem; 
            border-left: var(--stroke) solid var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #mobile-popup { 
            display: none; position: fixed; top: var(--header-h-mobile); left: 0; width: 100%; 
            height: calc(100vh - var(--header-h-mobile)); background: white; z-index: 2000; 
            padding: 40px 25px; padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        main { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); position: relative; z-index: 5; background: transparent; }

        .meta-strip {
            height: 80px; padding: 0 var(--grid-size); border-bottom: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Space Mono', monospace; font-size: 0.7rem; position: sticky; top: 0; z-index: 50;
        }

        /* PROJECTS */
        .project-row { display: flex; width: 100%; height: var(--row-h-desktop); border-bottom: var(--stroke) solid var(--text); background: transparent; align-items: stretch; }
        .project-row:nth-of-type(even) { flex-direction: row-reverse; }
        .project-text, .slider-container { width: 50%; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .project-text { padding: var(--grid-size); background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(2px); }
        .project-row:nth-of-type(odd) .project-text { border-right: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) .project-text { border-left: var(--stroke) solid var(--text); }

        .project-text h2 { font-size: 4.5vw; font-weight: 500; line-height: 0.9; margin-bottom: 25px; }
        .project-desc { font-size: 1.1rem; line-height: 1.5; max-width: 450px; font-weight: 300; margin-bottom: 30px;}

        .slider-container { position: relative; background: #eee; overflow: hidden; touch-action: pan-y; }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; cursor: pointer; }
        .slide-img { min-width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; pointer-events: none; }
        .slider-container:hover .slide-img { filter: grayscale(0); }

        .slider-nav { position: absolute; inset: 0; display: flex; justify-content: space-between; align-items: center; z-index: 10; pointer-events: none; }
        .nav-zone { width: 60px; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; cursor: pointer; pointer-events: auto; }
        .slider-container:hover .nav-zone { opacity: 1; }
        .nav-label { background: var(--orange); color: white; font-family: 'Space Mono'; padding: 12px 10px; font-weight: 700; font-size: 1.2rem; }

        footer { padding: var(--grid-size); background: white; display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.7rem; z-index: 100; position: relative; border-top: none; }

        /* LIGHTBOX POPUP (NOT FULLSCREEN) */
        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .lb-modal {
            position: relative; width: 85vw; height: 80vh; background: white; 
            border: var(--stroke) solid black; display: flex; align-items: center; justify-content: center;
        }
        .lb-modal img { max-width: 95%; max-height: 90%; object-fit: contain; }
        .lb-close { position: absolute; top: -20px; right: -20px; width: 40px; height: 40px; background: var(--orange); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: 'Space Mono'; font-weight: 700; border: var(--stroke) solid black; }
        
        .lb-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--orange); font-family: 'Space Mono'; font-weight: 700; font-size: 2rem; transition: 0.2s; }
        .lb-nav-btn:hover { background: rgba(255,85,0,0.1); }
        .lb-prev { left: 0; } .lb-next { right: 0; }

        .lb-dots { position: absolute; bottom: 20px; display: flex; gap: 8px; }
        .dot { width: 6px; height: 6px; background: black; border-radius: 50%; opacity: 0.2; transition: 0.3s; }
        .dot.active { opacity: 1; background: var(--orange); transform: scale(1.5); }

        /* GAME LAYER */
        #game-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .game-token { position: fixed; width: var(--grid-size); height: var(--grid-size); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono'; font-weight: 700; font-size: 1.2rem; animation: tokenIn 0.3s forwards; }
        @keyframes tokenIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.3); color: var(--orange); } }

        @media (max-width: 1100px) {
            aside { display: none; } header { display: flex; }
            main { margin-left: 0; width: 100%; margin-top: var(--header-h-mobile); }
            .project-row { flex-direction: column !important; height: auto; border-bottom: none; }
            .project-text, .slider-container { width: 100%; height: auto; border: none !important; }
            .project-text { order: 1; padding: 40px 25px; border-bottom: var(--stroke) solid var(--text) !important; min-height: 350px; }
            .slider-container { order: 2; height: 450px; border-bottom: var(--stroke) solid var(--text) !important; }
            .nav-zone { display: none; }
            .meta-strip { display: none; } .hero h1 { font-size: 16vw; } .hero { border-bottom: var(--stroke) solid var(--text); }
            footer { justify-content: center; } #footer-status, #coords { display: none; }
            .lb-modal { width: 95vw; height: 60vh; }
            .lb-close { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>

    <div id="game-layer"></div>

    <header>
        <div class="mobile-logo logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        <div class="header-controls">
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <button id="info-btn" onclick="togglePopup()">[info]</button>
        </div>
    </header>

    <div id="mobile-popup"><div class="sidebar-info-container"></div></div>

    <aside>
        <div class="desktop-logo-frame" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <div class="logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        </div>
        <div class="sidebar-content"><div class="sidebar-info-container"></div></div>
    </aside>

    <main>
        <div class="meta-strip">
            <div id="header-log-tag"></div>
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <span id="clock" style="font-family: 'Space Mono'; font-size: 0.7rem;">00:00:00</span>
        </div>

        <section class="updates-container" style="display: flex; height: 400px; border-bottom: var(--stroke) solid var(--text); background: black;">
            <div class="video-box" style="position: relative; width: 50%; height: 100%; overflow: hidden; border-right: var(--stroke) solid var(--text);">
                <video autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); opacity: 0.8;"><source src="videos/video1.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_01: site_friction</span></div>
            </div>
            <div class="video-box" style="position: relative; width: 50%; height: 100%; overflow: hidden;">
                <video autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); opacity: 0.8;"><source src="videos/video2.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_02: structural_void</span></div>
            </div>
        </section>

        <section class="hero" style="padding: 120px var(--grid-size); border-bottom: var(--stroke) solid var(--text);">
            <h1 style="font-size: 11vw; font-weight: 500; line-height: 0.85; letter-spacing: -0.05em;">built<br><span style="color: var(--orange);">different.</span></h1>
        </section>

        <div id="project-feed"></div>

        <footer>
            <span id="footer-status"></span>
            <span id="footer-copy"></span>
            <span id="coords">x: 000 y: 000</span>
        </footer>
    </main>

    <div id="lightbox" onclick="closeLightbox()">
        <div class="lb-modal" onclick="event.stopPropagation()">
            <div class="lb-close" onclick="closeLightbox()">X</div>
            <img id="lightbox-img" src="">
            <div class="lb-nav-btn lb-prev" onclick="changeLightbox(-1)">&lt;</div>
            <div class="lb-nav-btn lb-next" onclick="changeLightbox(1)">&gt;</div>
            <div class="lb-dots" id="lb-dots"></div>
        </div>
    </div>

    <script>
        let globalContent = { info: null, header: null, footer: null };
        let currentLang = 'en';
        let currentPlayer = 'x'; 
        let board = {}; 
        let gameActive = true;
        let projectList = [];
        let lbState = { project: null, index: 0 };

        async function loadSiteData() {
            try {
                const [info, header, footer] = await Promise.all([
                    fetch('content_info.json').then(r => r.json()),
                    fetch('content_header.json').then(r => r.json()),
                    fetch('content_footer.json').then(r => r.json())
                ]);
                globalContent = { info, header, footer };
                updateUI();
                initFeed();
            } catch (e) { console.error("Data Load Error", e); }
        }

        function updateUI() {
            const lang = currentLang;
            const info = globalContent.info;
            if (!info) return;

            let html = `
                <div class="sidebar-section"><h3 class="mono">01_about</h3><p class="light">${info.about[lang]}</p></div>
                <div class="sidebar-section"><h3 class="mono">02_team</h3>
                    ${info.team.map(m => `
                        <div style="margin-bottom:25px">
                            <span class="med" style="font-size: 1.1rem; display: block; font-weight: 500; margin-bottom: 4px;">${m.name}</span>
                            <span class="profession light" style="font-size: 0.8rem; display: block; margin-bottom: 6px; opacity: 0.6;">${m.profession[lang]}</span>
                            <p class="bio light" style="font-size: 0.9rem; opacity: 0.8; line-height: 1.4; font-weight: 300;">${m.bio[lang]}</p>
                        </div>`).join('')}
                </div>
                <div class="sidebar-section"><h3 class="mono">03_contact</h3>
                    ${info.contact.map(office => `<div style="margin-bottom:25px"><span class="med" style="font-size: 1.1rem; display: block; font-weight: 500; margin-bottom: 4px;">${office.title[lang]}</span><p class="light">${office.address}</p></div>`).join('')}
                </div>
                <div class="sidebar-section">
                    ${info.socials.map(soc => `<a href="${soc.url}" target="_blank" class="contact-link med">${soc.label}</a>`).join('')}
                </div>
            `;
            document.querySelectorAll('.sidebar-info-container').forEach(el => el.innerHTML = html);

            if (globalContent.header) {
                document.getElementById('header-log-tag').innerText = globalContent.header.log_version[lang];
                const infoBtn = document.getElementById('info-btn');
                const isVisible = document.getElementById('mobile-popup').style.display === 'block';
                infoBtn.innerText = isVisible ? globalContent.header.close_label : globalContent.header.info_label;
            }
            if (globalContent.footer) {
                document.getElementById('footer-status').innerText = globalContent.footer.system_status;
                document.getElementById('footer-copy').innerText = globalContent.footer.copyright;
            }
        }

        const EXTENSIONS = ['jpg', 'jpeg', 'png', 'webp'];
        async function probeImage(folder, index) {
            for (const ext of EXTENSIONS) {
                const url = `images/${folder}/${index}.${ext}`;
                const exists = await new Promise(res => {
                    const img = new Image();
                    img.onload = () => res(true);
                    img.onerror = () => res(false);
                    img.src = url;
                });
                if (exists) return url;
            } return null;
        }

        async function initFeed() {
            const feed = document.getElementById('project-feed');
            for (let pNum = 1; pNum <= 20; pNum++) {
                const folder = `project${pNum}`;
                const firstImg = await probeImage(folder, 1);
                if (firstImg) {
                    let meta = { tag: `[log_0${pNum}]`, title: `project_log_${pNum}`, en: `Case study.`, tr: `Vaka çalışması.`, specs: `Loc: TR // 2025` };
                    try { const res = await fetch(`images/${folder}/meta.json`); if (res.ok) meta = await res.json(); } catch (e) {}

                    let imgs = [firstImg];
                    for (let iNum = 2; iNum <= 12; iNum++) {
                        const path = await probeImage(folder, iNum);
                        if (path) imgs.push(path); else break;
                    }

                    const pObj = { id: pNum, meta, imgs, cur: 0 };
                    projectList.push(pObj);

                    const row = document.createElement('section');
                    row.className = 'project-row';
                    row.innerHTML = `
                        <div class="project-text">
                            <div class="project-meta mono" style="margin-bottom:10px;">${meta.tag}</div>
                            <h2 class="med">${meta.title}</h2>
                            <p class="light project-desc" style="font-size: 1.1rem; line-height: 1.5; max-width: 450px; font-weight: 300; margin-bottom: 30px;">${currentLang === 'en' ? meta.en : meta.tr}</p>
                            <div class="project-specs" style="font-family: 'Space Mono', monospace; font-size: 0.65rem; opacity: 0.5; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px;">${meta.specs}</div>
                        </div>
                        <div class="slider-container" id="slider-${pNum}">
                            <div class="slider-track" onclick="openLightbox(${pNum})">${imgs.map(s => `<img data-src="${s}" class="slide-img lazy">`).join('')}</div>
                            ${imgs.length > 1 ? `
                            <div class="slider-nav">
                                <div class="nav-zone" style="left:0" onclick="moveSlide(${pNum}, -1, event)"><span class="nav-label">&lt;</span></div>
                                <div class="nav-zone" style="right:0" onclick="moveSlide(${pNum}, 1, event)"><span class="nav-label">&gt;</span></div>
                            </div>` : ''}
                        </div>`;
                    feed.appendChild(row);
                    setupLazyLoad(row);
                    setupSwipe(row.querySelector('.slider-container'), pNum);
                }
            }
        }

        function setupLazyLoad(row) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.querySelectorAll('.lazy').forEach(img => { img.src = img.dataset.src; img.classList.remove('lazy'); });
                        observer.unobserve(entry.target);
                    }
                });
            }, { rootMargin: '200px' });
            observer.observe(row);
        }

        function moveSlide(id, dir, e) {
            if(e) e.stopPropagation();
            const p = projectList.find(x => x.id === id);
            const container = document.getElementById(`slider-${id}`);
            const track = container.querySelector('.slider-track');
            p.cur = (p.cur + dir + p.imgs.length) % p.imgs.length;
            track.style.transform = `translateX(-${p.cur * 100}%)`;
        }

        function setupSwipe(el, id) {
            let startX = 0;
            el.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
            el.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) moveSlide(id, diff > 0 ? 1 : -1);
            }, {passive: true});
        }

        function openLightbox(id) {
            const p = projectList.find(x => x.id === id);
            lbState = { project: p, index: p.cur };
            updateLightbox();
            document.getElementById('lightbox').style.display = 'flex';
        }

        function updateLightbox() {
            const p = lbState.project;
            document.getElementById('lightbox-img').src = p.imgs[lbState.index];
            const dotsCont = document.getElementById('lb-dots');
            dotsCont.innerHTML = p.imgs.length > 1 ? p.imgs.map((_, i) => `<div class="dot ${i === lbState.index ? 'active' : ''}"></div>`).join('') : '';
            
            const btns = document.querySelectorAll('.lb-nav-btn');
            btns.forEach(b => b.style.display = p.imgs.length > 1 ? 'flex' : 'none');
        }

        function changeLightbox(dir) {
            const p = lbState.project;
            lbState.index = (lbState.index + dir + p.imgs.length) % p.imgs.length;
            updateLightbox();
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        // XOX GAME (Synced with infinite grid)
        window.addEventListener('mousedown', (e) => {
            if (!gameActive || e.target.closest('aside, header, button, .nav-zone, #lightbox')) return;
            const col = Math.floor(e.clientX / 40); const row = Math.floor(e.clientY / 40);
            const key = `${col},${row}`;
            if (!board[key]) {
                board[key] = currentPlayer;
                const t = document.createElement('div'); t.className = 'game-token'; t.innerText = currentPlayer;
                t.style.position = 'fixed'; 
                t.style.left = (col * 40) + 'px'; t.style.top = (row * 40) + 'px';
                t.style.color = currentPlayer === 'x' ? 'var(--orange)' : 'black';
                t.dataset.coord = key;
                document.getElementById('game-layer').appendChild(t);
                
                const winPath = checkWin(col, row, currentPlayer);
                if (winPath) {
                    gameActive = false;
                    winPath.forEach(coords => {
                        const el = document.querySelector(`[data-coord="${coords[0]},${coords[1]}"]`);
                        if (el) el.style.animation = 'winPulse 0.4s infinite alternate';
                    });
                    if (globalContent.header) document.getElementById('header-log-tag').innerText = `[alert: winner_${currentPlayer}_detected]`;
                    document.getElementById('header-log-tag').style.color = 'var(--orange)';
                } else currentPlayer = (currentPlayer === 'x') ? 'o' : 'x';
            }
        });
        function checkWin(c, r, p) {
            const dirs = [[1,0], [0,1], [1,1], [1,-1]];
            for (let [dx, dy] of dirs) {
                let path = [[c, r]];
                for (let i = 1; i < 3; i++) { if (board[`${c+(dx*i)},${r+(dy*i)}`] === p) path.push([c+(dx*i), r+(dy*i)]); else break; }
                for (let i = 1; i < 3; i++) { if (board[`${c-(dx*i)},${r-(dy*i)}`] === p) path.push([c-(dx*i), r-(dy*i)]); else break; }
                if (path.length >= 3) return path;
            } return null;
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            document.querySelectorAll('.en-toggle').forEach(el => el.classList.toggle('active', currentLang === 'en'));
            document.querySelectorAll('.tr-toggle').forEach(el => el.classList.toggle('active', currentLang === 'tr'));
            updateUI();
            projectList.forEach(p => {
                const row = document.getElementById(`slider-${p.id}`).closest('.project-row');
                const desc = row.querySelector('.project-desc');
                if (desc) desc.innerText = currentLang === 'en' ? p.meta.en : p.meta.tr;
            });
        }
        function togglePopup() { 
            const p = document.getElementById('mobile-popup'); 
            p.style.display = (p.style.display === 'block') ? 'none' : 'block'; 
            updateUI();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        window.addEventListener('mousemove', (e) => { 
            document.getElementById('coords').innerText = `x: ${String(e.clientX).padStart(3, '0')} y: ${String(e.clientY).padStart(3, '0')}`; 
        });

        loadSiteData();
    </script>
</body>
</html>
