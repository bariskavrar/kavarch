<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>kavarch — built different.</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --orange: #ff5500; 
            --grid-size: 40px; 
            --grid-line: rgba(0, 0, 0, 0.12);
            --sidebar-w: 400px; 
            --header-h-mobile: 120px;
            --stroke: 2px;
            --row-h-desktop: 550px;
        }

        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: lowercase !important; -webkit-font-smoothing: antialiased; }
        html, body { width: 100%; height: 100%; background-color: var(--bg); overflow-x: hidden; }

        /* FIX: iPhone Background / XOX Grid */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px), 
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            z-index: -1;
            pointer-events: none;
        }

        body { font-family: 'Jost', sans-serif; color: var(--text); cursor: crosshair; display: block; }
        .logo-text { letter-spacing: -2px; line-height: 1; color: black !important; text-decoration: none !important; display: inline-block; }
        .logo-text .kav { font-weight: 600; } .logo-text .arch { font-weight: 300; }
        
        /* TYPOGRAPHY */
        .mono { font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
        .med { font-weight: 500; }
        .light { font-weight: 300; }

        /* LANGUAGE SWITCH */
        .lang-switch { font-family: 'Space Mono', monospace; font-size: 0.7rem; display: inline-flex; cursor: pointer; user-select: none; }
        .lang-btn { opacity: 0.2; transition: 0.3s; pointer-events: none; }
        .lang-btn.active { opacity: 1; color: var(--orange); font-weight: 700; }
        .lang-switch .slash { opacity: 0.2; margin: 0 1px; }

        /* SIDEBAR */
        aside {
            width: var(--sidebar-w); height: 100vh; position: fixed; left: 0; top: 0;
            border-right: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; z-index: 100;
        }
        .desktop-logo-frame {
            width: 100%; height: 180px; border-bottom: var(--stroke) solid var(--text);
            display: flex; align-items: center; justify-content: center; font-size: 3.8rem;
            transition: 0.2s; cursor: pointer; background: white;
        }
        .desktop-logo-frame:hover { background: var(--orange); }
        .desktop-logo-frame:hover .logo-text, .desktop-logo-frame:hover .logo-text span { color: white !important; }
        .sidebar-content { padding: var(--grid-size); flex-grow: 1; overflow-y: auto; }
        .sidebar-section { margin-bottom: 40px; }

        /* MAIN & FEED */
        main { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); position: relative; z-index: 5; }
        .meta-strip {
            height: 80px; padding: 0 var(--grid-size); border-bottom: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Space Mono', monospace; font-size: 0.7rem; position: sticky; top: 0; z-index: 50;
        }

        /* PROJECTS */
        .project-row { display: flex; width: 100%; height: var(--row-h-desktop); border-bottom: var(--stroke) solid var(--text); background: transparent; }
        .project-row:nth-of-type(even) { flex-direction: row-reverse; }
        .project-text, .slider-container { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .project-text { padding: var(--grid-size); background: rgba(255, 255, 255, 0.75); }
        .project-row:nth-of-type(odd) .project-text { border-right: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) .project-text { border-left: var(--stroke) solid var(--text); }
        .project-text h2 { font-size: 4.5vw; line-height: 0.9; margin-bottom: 25px; }

        /* SLIDER & INTERACTION */
        .slider-container { position: relative; background: #f0f0f0; overflow: hidden; touch-action: pan-y; }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; }
        .slide-img { min-width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; }
        .slider-container:hover .slide-img { filter: grayscale(0); }
        
        .slider-nav { position: absolute; inset: 0; display: flex; z-index: 10; }
        .nav-zone { width: 40px; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; cursor: pointer; }
        .slider-container:hover .nav-zone { opacity: 1; }
        .nav-label { background: var(--orange); color: white; font-family: 'Space Mono'; padding: 10px 5px; font-weight: 700; font-size: 1rem; }
        
        /* Middle Click Area for Desktop */
        .middle-click-trigger { position: absolute; inset: 0 40px; z-index: 5; cursor: zoom-in; }

        /* LIGHTBOX POPUP */
        #lightbox {
            position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; border: var(--stroke) solid black; }
        .lightbox-close { position: absolute; top: 40px; right: 40px; font-family: 'Space Mono'; cursor: pointer; font-weight: 700; background: var(--orange); color: white; padding: 10px; }
        .lightbox-nav { position: absolute; bottom: 40px; display: flex; gap: 40px; font-family: 'Space Mono'; font-weight: 700; font-size: 1.2rem; cursor: pointer; }

        /* MOBILE HEADER */
        header {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h-mobile);
            background: white; border-bottom: var(--stroke) solid var(--text); z-index: 3000;
            padding: 0 0 0 25px; justify-content: space-between; align-items: center;
        }

        /* GAME LAYER */
        #game-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .game-token { position: absolute; width: var(--grid-size); height: var(--grid-size); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono'; font-weight: 700; font-size: 1.2rem; }

        @media (max-width: 1100px) {
            aside { display: none; } header { display: flex; }
            main { margin-left: 0; width: 100%; margin-top: var(--header-h-mobile); }
            .project-row { flex-direction: column !important; height: auto; }
            .project-text, .slider-container { width: 100%; border: none !important; }
            .slider-container { height: 450px; border-bottom: var(--stroke) solid var(--text) !important; }
            .project-text { padding: 40px 25px; border-bottom: var(--stroke) solid var(--text) !important; }
            .nav-zone { display: none; } /* Use swipe on mobile */
            .middle-click-trigger { display: none; }
        }
    </style>
</head>
<body>

    <div id="game-layer"></div>

    <header>
        <div class="mobile-logo logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        <div class="header-controls">
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <button id="info-btn" style="background:var(--orange); color:white; border:none; height:100%; width:80px; font-family:'Space Mono'; cursor:pointer;" onclick="togglePopup()">[info]</button>
        </div>
    </header>

    <div id="mobile-popup" style="display:none; position:fixed; top:120px; left:0; width:100%; height:calc(100vh - 120px); background:white; z-index:2000; padding:40px 25px; overflow-y:auto;">
        <div class="sidebar-info-container"></div>
    </div>

    <aside>
        <div class="desktop-logo-frame" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <div class="logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        </div>
        <div class="sidebar-content"><div class="sidebar-info-container"></div></div>
    </aside>

    <main>
        <div class="meta-strip">
            <div id="header-log-tag">system_log: active</div>
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <span id="clock" style="font-family:'Space Mono'">00:00:00</span>
        </div>

        <section class="hero" style="padding: 120px 40px; border-bottom: var(--stroke) solid black;">
            <h1 style="font-size: 11vw; line-height: 0.85;">built<br><span style="color: var(--orange);">different.</span></h1>
        </section>

        <div id="project-feed"></div>

        <footer style="padding: 40px; display:flex; justify-content: space-between; font-family:'Space Mono'; font-size:0.7rem; border-top:var(--stroke) solid black;">
            <span>system_stable</span>
            <span>© 2025 kavarch</span>
            <span id="coords">x:000 y:000</span>
        </footer>
    </main>

    <div id="lightbox">
        <div class="lightbox-close" onclick="closeLightbox()">close_x</div>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-nav">
            <span onclick="changeLightbox(-1)">&lt; prev</span>
            <span onclick="changeLightbox(1)">next &gt;</span>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let projectData = [];
        let activeLightboxProject = null;
        let activeLightboxIndex = 0;

        // Optimized Content Loading
        async function loadContent() {
            try {
                const info = await fetch('content_info.json').then(r => r.json());
                renderSidebar(info);
            } catch (e) { console.error("JSON load failed, check file names."); }
        }

        function renderSidebar(info) {
            const html = `
                <div class="sidebar-section">
                    <h3 class="mono">01_about</h3>
                    <p class="light">${info.about[currentLang]}</p>
                </div>
                <div class="sidebar-section">
                    <h3 class="mono">02_team</h3>
                    ${info.team.map(m => `<div style="margin-bottom:15px"><span class="med">${m.name}</span><br><span class="light" style="opacity:0.6">${m.profession[currentLang]}</span></div>`).join('')}
                </div>
                <div class="sidebar-section">
                    <h3 class="mono">03_contact</h3>
                    <p class="light">${info.contact[0].address}</p>
                    <a href="mailto:info@kavarch.com" class="med" style="color:black; text-decoration:underline;">info@kavarch.com</a>
                </div>`;
            document.querySelectorAll('.sidebar-info-container').forEach(el => el.innerHTML = html);
        }

        // Optimized Project Feeding
        async function initFeed() {
            const feed = document.getElementById('project-feed');
            for(let i=1; i<=10; i++) { // Probing first 10 projects
                const folder = `project${i}`;
                const metaUrl = `images/${folder}/meta.json`;
                try {
                    const meta = await fetch(metaUrl).then(r => r.json());
                    const imgs = [];
                    for(let j=1; j<=5; j++) imgs.push(`images/${folder}/${j}.jpg`); // Assuming jpg for speed, check probe logic if needed
                    
                    projectData.push({ id: i, imgs, meta });
                    renderProject(feed, i, meta, imgs);
                } catch(e) { break; }
            }
        }

        function renderProject(container, id, meta, imgs) {
            const row = document.createElement('section');
            row.className = 'project-row';
            row.innerHTML = `
                <div class="project-text">
                    <div class="mono" style="margin-bottom:10px">${meta.tag || '[log_0'+id+']'}</div>
                    <h2 class="med">${meta.title}</h2>
                    <p class="light">${currentLang === 'en' ? meta.en : meta.tr}</p>
                </div>
                <div class="slider-container" data-id="${id}">
                    <div class="middle-click-trigger" onclick="openLightbox(${id})"></div>
                    <div class="slider-track">${imgs.map(src => `<img data-src="${src}" class="slide-img lazy">`).join('')}</div>
                    <div class="slider-nav">
                        <div class="nav-zone" style="left:0" onclick="moveSlider(this, -1)"><span class="nav-label">&lt;</span></div>
                        <div class="nav-zone" style="right:0" onclick="moveSlider(this, 1)"><span class="nav-label">&gt;</span></div>
                    </div>
                </div>`;
            container.appendChild(row);
            observeLazyImages(row);
            setupTouch(row.querySelector('.slider-container'));
        }

        // Lazy Loading & Slider Logic
        function observeLazyImages(row) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const imgs = entry.target.querySelectorAll('.slide-img.lazy');
                        imgs.forEach(img => { img.src = img.dataset.src; img.classList.remove('lazy'); });
                        observer.unobserve(entry.target);
                    }
                });
            });
            observer.observe(row);
        }

        function moveSlider(btn, dir) {
            const container = btn.closest('.slider-container');
            const track = container.querySelector('.slider-track');
            const slides = track.children.length;
            let current = parseInt(container.dataset.index || 0);
            current = (current + dir + slides) % slides;
            container.dataset.index = current;
            track.style.transform = `translateX(-${current * 100}%)`;
        }

        // Mobile Swipe
        function setupTouch(container) {
            let startX = 0;
            container.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            container.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) moveSlider(container.querySelector('.nav-zone'), diff > 0 ? 1 : -1);
            });
        }

        // Lightbox Logic
        function openLightbox(id) {
            activeLightboxProject = projectData.find(p => p.id === id);
            activeLightboxIndex = parseInt(document.querySelector(`.slider-container[data-id="${id}"]`).dataset.index || 0);
            updateLightbox();
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        function updateLightbox() {
            document.getElementById('lightbox-img').src = activeLightboxProject.imgs[activeLightboxIndex];
        }

        function changeLightbox(dir) {
            const len = activeLightboxProject.imgs.length;
            activeLightboxIndex = (activeLightboxIndex + dir + len) % len;
            updateLightbox();
        }

        // Global UI
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            document.querySelectorAll('.en-toggle').forEach(el => el.classList.toggle('active', currentLang === 'en'));
            document.querySelectorAll('.tr-toggle').forEach(el => el.classList.toggle('active', currentLang === 'tr'));
            loadContent();
            // Refresh feed texts
            document.getElementById('project-feed').innerHTML = '';
            projectData = [];
            initFeed();
        }

        function togglePopup() {
            const p = document.getElementById('mobile-popup');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        // XOX Game logic (Simplified from existing)
        let currentPlayer = 'x';
        let board = {};
        window.addEventListener('mousedown', e => {
            if (e.target.closest('aside, header, button, .nav-zone, #lightbox')) return;
            const col = Math.floor(e.clientX / 40), row = Math.floor(e.clientY / 40);
            const key = `${col},${row}`;
            if (!board[key]) {
                board[key] = currentPlayer;
                const token = document.createElement('div');
                token.className = 'game-token';
                token.style.left = col*40+'px'; token.style.top = row*40+'px';
                token.innerText = currentPlayer;
                token.style.color = currentPlayer === 'x' ? 'var(--orange)' : 'black';
                document.getElementById('game-layer').appendChild(token);
                currentPlayer = currentPlayer === 'x' ? 'o' : 'x';
            }
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        window.addEventListener('mousemove', e => { 
            document.getElementById('coords').innerText = `x:${String(e.clientX).padStart(3,'0')} y:${String(e.clientY).padStart(3,'0')}`; 
        });

        loadContent();
        initFeed();
    </script>
</body>
</html>
