<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>kavarch — built different.</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --orange: #ff5500; 
            --grid-size: 40px; 
            --grid-line: rgba(0, 0, 0, 0.12);
            --sidebar-w: 400px; 
            --header-h-mobile: 120px;
            --stroke: 2px;
            --row-h-desktop: 550px;
        }

        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: lowercase !important; -webkit-font-smoothing: antialiased; }
        html, body { width: 100%; background-color: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }

        body { 
            font-family: 'Jost', sans-serif; color: var(--text); cursor: crosshair;
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size); background-attachment: fixed;
        }

        .logo-text { letter-spacing: -2px; line-height: 1; color: black !important; text-decoration: none !important; display: inline-block; }
        .logo-text .kav { font-weight: 600; } .logo-text .arch { font-weight: 300; }

        /* GAME LAYER */
        #game-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .game-token { 
            position: absolute; width: var(--grid-size); height: var(--grid-size); 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 1.2rem; 
            animation: tokenIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }
        @keyframes tokenIn { from { transform: scale(0) rotate(-45deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }
        @keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.3); text-shadow: 0 0 10px var(--orange); } }

        /* HEADER & META STRIP */
        aside {
            width: var(--sidebar-w); height: 100vh; position: fixed; left: 0; top: 0;
            border-right: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; z-index: 100;
        }

        header {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h-mobile);
            background: white; border-bottom: var(--stroke) solid var(--text); z-index: 3000;
            padding: 0 0 0 25px; justify-content: space-between; align-items: center;
        }

        .meta-strip {
            height: 80px; padding: 0 var(--grid-size); border-bottom: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Space Mono', monospace; font-size: 0.7rem; position: sticky; top: 0; z-index: 50;
        }

        /* SYSTEM LOG - MATCHING FOOTER */
        #system-log {
            font-weight: 400; /* Regular weight like footer */
            color: var(--text); /* Black color like footer */
            letter-spacing: 0;
            transition: color 0.3s, font-weight 0.3s;
        }

        /* DYNAMIC UI CLASSES */
        .lang-switch { cursor: pointer; user-select: none; font-family: 'Space Mono', monospace; font-size: 0.7rem; }
        .lang-btn { opacity: 0.2; transition: 0.3s; }
        .lang-btn.active { opacity: 1; color: var(--orange); font-weight: 700; }
        .mono { font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
        .med { font-weight: 500; }
        .light { font-weight: 300; }

        /* CONTENT */
        .updates-container { display: flex; height: 400px; border-bottom: var(--stroke) solid var(--text); background: black; }
        .video-box { position: relative; width: 50%; height: 100%; overflow: hidden; border-right: var(--stroke) solid var(--text); }
        .video-box video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); opacity: 0.8; transition: 0.6s; }
        .video-box:hover video { filter: grayscale(0); opacity: 1; }
        .tag { position: absolute; bottom: 20px; left: 20px; background: var(--orange); color: white; padding: 4px 12px; font-family: 'Space Mono'; font-size: 0.6rem; }

        .hero { padding: 120px var(--grid-size); border-bottom: var(--stroke) solid var(--text); }
        .hero h1 { font-size: 11vw; font-weight: 500; line-height: 0.85; letter-spacing: -0.05em; pointer-events: none; }

        .project-row { display: flex; width: 100%; height: var(--row-h-desktop); border-bottom: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) { flex-direction: row-reverse; }
        .project-text { width: 50%; padding: var(--grid-size); border-right: var(--stroke) solid var(--text); background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); }
        .project-row:nth-of-type(even) .project-text { border-right: none; border-left: var(--stroke) solid var(--text); }
        .slider-container { width: 50%; position: relative; background: #eee; overflow: hidden; }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-img { min-width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        footer { padding: var(--grid-size); display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.7rem; }

        @media (max-width: 1100px) {
            aside { display: none; } header { display: flex; }
            main { margin-left: 0; margin-top: var(--header-h-mobile); }
            .project-row { flex-direction: column !important; height: auto; }
            .project-text, .slider-container { width: 100%; border: none !important; border-bottom: var(--stroke) solid var(--text) !important; }
            .slider-container { height: 400px; }
        }
    </style>
</head>
<body>

    <div id="game-layer"></div>

    <header>
        <div class="mobile-logo logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        <div class="header-controls">
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span> / <span class="lang-btn tr-toggle">tr</span>
            </div>
            <button id="info-btn" onclick="togglePopup()" style="background:var(--orange); color:white; border:none; height:100%; width:100px; font-family:'Space Mono'; font-weight:700;">[info]</button>
        </div>
    </header>

    <aside>
        <div style="width:100%; height:180px; border-bottom:var(--stroke) solid var(--text); display:flex; align-items:center; justify-content:center; font-size:3.8rem; cursor:pointer;" onclick="window.scrollTo(0,0)">
            <div class="logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        </div>
        <div class="sidebar-info-container" style="padding:40px; overflow-y:auto;"></div>
    </aside>

    <main>
        <div class="meta-strip">
            <!-- Style is handled by #system-log in CSS -->
            <div id="system-log">transmission_log_v.26</div>
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span> / <span class="lang-btn tr-toggle">tr</span>
            </div>
            <span id="clock" style="font-family:'Space Mono'">00:00:00</span>
        </div>

        <section class="updates-container">
            <div class="video-box">
                <video autoplay muted loop playsinline><source src="videos/video1.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_01: site_friction</span></div>
            </div>
            <div class="video-box">
                <video autoplay muted loop playsinline><source src="videos/video2.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_02: structural_void</span></div>
            </div>
        </section>

        <section class="hero">
            <h1>built<br><span style="color: var(--orange);">different.</span></h1>
        </section>

        <div id="project-feed"></div>

        <footer>
            <span>system_operational</span>
            <span>© 2025 kavarch studio</span>
            <span id="coords">x: 000 y: 000</span>
        </footer>
    </main>

    <script>
        let currentLang = 'en';
        let gameActive = true;
        let winner = null;

        function updateUI() {
            // About text
            const container = document.querySelector('.sidebar-info-container');
            container.innerHTML = `
                <div style="margin-bottom:40px"><h3 class="mono">01_about</h3><p class="light">${currentLang === 'en' ? 'kavarch is a speculative architectural laboratory navigating friction within the infinite grid.' : 'kavarch sonsuz ızgara içindeki sürtünmeyi araştıran spekülatif bir mimari laboratuvardır.'}</p></div>
                <div><h3 class="mono">02_team</h3><span class="med">barış kavraroğlu</span><br><span class="med">burak kavraroğlu</span></div>
            `;

            // System Log State
            const log = document.getElementById('system-log');
            if (winner) {
                // High priority Alert state
                log.innerText = currentLang === 'en' ? `[alert: winner_${winner}_detected]` : `[uyarı: kazanan_${winner}_tespit_edildi]`;
                log.style.color = 'var(--orange)';
                log.style.fontWeight = '700';
            } else {
                // Default Footer-like state
                log.innerText = currentLang === 'en' ? 'transmission_log_v.26' : 'iletişim_kaydı_v.26';
                log.style.color = 'var(--text)';
                log.style.fontWeight = '400';
            }
        }

        function initProjects() {
            const feed = document.getElementById('project-feed');
            const projects = [
                { id: "01", title: "liminal monoliths", en: "Investigation into urban voids.", tr: "Kentsel boşluklar üzerine inceleme.", img: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=800" }
            ];
            projects.forEach(p => {
                const row = document.createElement('section');
                row.className = 'project-row';
                row.innerHTML = `
                    <div class="project-text">
                        <div class="mono">[log_${p.id}]</div>
                        <h2 class="med" style="font-size:3rem; margin:20px 0;">${p.title}</h2>
                        <p class="light">${p[currentLang]}</p>
                    </div>
                    <div class="slider-container"><img src="${p.img}" class="slide-img"></div>
                `;
                feed.appendChild(row);
            });
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            document.querySelectorAll('.en-toggle').forEach(el => el.classList.toggle('active', currentLang === 'en'));
            document.querySelectorAll('.tr-toggle').forEach(el => el.classList.toggle('active', currentLang === 'tr'));
            updateUI();
        }

        // XOX GAME
        let board = {};
        window.addEventListener('mousedown', (e) => {
            if (!gameActive || e.target.closest('aside') || e.target.closest('header') || e.target.closest('button') || e.target.closest('.meta-strip')) return;
            const col = Math.floor(e.clientX / 40);
            const row = Math.floor(e.clientY / 40);
            const key = `${col},${row}`;
            if (!board[key]) {
                board[key] = winner ? null : (board[key] = (function(){
                    const p = (Object.keys(board).length % 2 === 0) ? 'x' : 'o';
                    const t = document.createElement('div');
                    t.className = 'game-token'; t.innerText = p;
                    t.style.left = (col * 40) + 'px'; t.style.top = (row * 40) + 'px';
                    t.style.color = p === 'x' ? 'var(--orange)' : 'black';
                    t.dataset.coord = key;
                    document.getElementById('game-layer').appendChild(t);
                    
                    // Simple win check
                    const check = (dx, dy) => {
                        let count = 1;
                        [[dx,dy], [-dx,-dy]].forEach(([sx,sy]) => {
                            for(let i=1; i<3; i++) {
                                if(board[`${col+(sx*i)},${row+(sy*i)}`] === p) count++; else break;
                            }
                        });
                        return count >= 3;
                    };

                    if(check(1,0) || check(0,1) || check(1,1) || check(1,-1)) {
                        gameActive = false; winner = p; updateUI();
                    }
                    return p;
                })());
            }
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        window.addEventListener('mousemove', (e) => { 
            document.getElementById('coords').innerText = `x: ${String(e.clientX).padStart(3, '0')} y: ${String(e.clientY).padStart(3, '0')}`; 
        });

        updateUI();
        initProjects();
    </script>
</body>
</html>
