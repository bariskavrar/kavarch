<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>sofra — built different.</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        /* 1. V5 SELF-HOSTED FONTS */
        @font-face { font-family: 'FuturaLTPro'; src: url('FuturaLTPro-Light.woff2') format('woff2'); font-weight: 300; }
        @font-face { font-family: 'FuturaLTPro'; src: url('FuturaLTPro-Book.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'FuturaLTPro'; src: url('FuturaLTPro-Medium.woff2') format('woff2'); font-weight: 500; }
        @font-face { font-family: 'FuturaLTPro'; src: url('FuturaLTPro-SemiBold.woff2') format('woff2'); font-weight: 600; }
        @font-face { font-family: 'SpaceMono'; src: url('https://fonts.gstatic.com/s/spacemono/v13/i7dMIFZifjKcF5UAWdDRYRE.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'SpaceMono'; src: url('https://fonts.gstatic.com/s/spacemono/v13/i7dVISZifjKcF5UAWdDRYefSxA.woff2') format('woff2'); font-weight: 700; }

        :root {
            --bg: #ffffff; --text: #000000; --orange: #ff5500; 
            --grid-size: 40px; --grid-line: rgba(0, 0, 0, 0.12);
            --sidebar-w: 500px; --header-h-mobile: 120px; --stroke: 2px;
        }

        /* V5 NO LIGATURES & LEFT ALIGN */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; text-transform: lowercase !important; 
            -webkit-font-smoothing: antialiased; font-variant-ligatures: none !important;
            font-feature-settings: "liga" 0 !important;
        }

        html { background-color: var(--bg); }
        body { font-family: 'FuturaLTPro', Arial, sans-serif; color: var(--text); cursor: crosshair; overflow-x: hidden; }

        /* FIXED GRID */
        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
        }

        /* SIDEBAR */
        aside {
            width: var(--sidebar-w); height: 100vh; position: fixed; left: 0; top: 0;
            border-right: var(--stroke) solid var(--text); background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; z-index: 100;
        }
        .desktop-logo-frame {
            width: 100%; height: 200px !important; border-bottom: var(--stroke) solid var(--text);
            display: flex; align-items: center; justify-content: center; background: white; transition: 0.2s; cursor: pointer;
        }
        .desktop-logo-frame:hover { background: var(--orange); }
        .desktop-logo-frame:hover .logo-img { filter: invert(1) brightness(10); }
        .logo-img { height: 50px; width: auto; transition: 0.2s; }

        .sidebar-content, #mobile-popup { padding: var(--grid-size); flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .sidebar-content::-webkit-scrollbar, #mobile-popup::-webkit-scrollbar { display: none; }

        .sidebar-section { margin-bottom: 40px; }
        .sidebar-section h3 { margin-bottom: 12px; font-family: "SpaceMono", monospace; font-size: 0.7rem; font-weight: 700 !important; color: var(--orange); letter-spacing: 2px; }
        
        .txt-medium { font-weight: 400; font-size: 1rem; text-align: left; }
        .txt-light { font-weight: 300; font-size: 1rem; line-height: 1.5; text-align: left; }
        .profession { font-size: 0.8rem; display: block; margin-bottom: 6px; opacity: 0.6; font-weight: 300; }
        .contact-link { display: block; margin-top: 5px; text-decoration: underline !important; color: black !important; font-weight: 400; }

        /* V5 HERO SECTION (640PX) */
        .hero-modular {
            display: flex; width: 100%; height: 640px; border-bottom: var(--stroke) solid var(--text);
            padding: var(--grid-size); gap: var(--grid-size); align-items: flex-end; /* Push to bottom half */
        }
        .hero-box {
            flex: 1; height: 50%; /* Content stays in bottom half */
            display: flex; align-items: flex-end; padding-bottom: 20px;
            font-family: "SpaceMono", monospace; font-size: 1.2rem; color: var(--orange);
            font-weight: 400; line-height: 1.1;
        }

        header {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h-mobile);
            background: white; border-bottom: var(--stroke) solid var(--text); z-index: 3000;
            padding: 0 0 0 25px; justify-content: space-between; align-items: center;
        }
        .mobile-logo-img { height: 35px; width: auto; }
        #info-btn { 
            background: var(--orange); color: white; border: none; height: 100%; width: 100px; font-family: 'SpaceMono'; font-weight: 700;
            border-left: var(--stroke) solid var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        #mobile-popup { display: none; position: fixed; top: var(--header-h-mobile); left: 0; width: 100%; height: calc(100vh - var(--header-h-mobile)); background: white; z-index: 2000; padding: 40px 25px; padding-bottom: 80px; }

        main { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); position: relative; z-index: 5; background: transparent; }
        .meta-strip { height: 80px; padding: 0 var(--grid-size); border-bottom: var(--stroke) solid var(--text); background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px); display: flex; justify-content: space-between; align-items: center; font-family: 'SpaceMono'; font-size: 0.7rem; position: sticky; top: 0; z-index: 50; }

        .project-row { display: flex; width: 100%; height: 550px; border-bottom: var(--stroke) solid var(--text); background: transparent; align-items: stretch; margin-top: 80px; }
        #project-feed .project-row:first-child { margin-top: 0; border-top: none; }
        #project-feed .project-row:not(:first-child) { border-top: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) { flex-direction: row-reverse; }
        .project-text { width: 50%; padding: var(--grid-size); background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(2px); display: flex; flex-direction: column; justify-content: center; border-right: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) .project-text { border-right: none; border-left: var(--stroke) solid var(--text); }
        .project-desc { font-size: 1rem; line-height: 1.5; font-weight: 300; margin-bottom: 30px; text-align: left;}

        .slider-container { width: 50%; position: relative; background: #eee; overflow: hidden; }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; }
        .slide-img { min-width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; }
        .slider-container:hover .slide-img { filter: grayscale(0); }
        .nav-zone { width: 60px; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; cursor: pointer; position: absolute; top: 0; z-index: 10; }
        .slider-container:hover .nav-zone { opacity: 1; }
        .nav-triangle { color: var(--orange); font-size: 1.5rem; }
        
        footer { padding: var(--grid-size); background: white; display: flex; justify-content: space-between; font-family: 'SpaceMono'; font-size: 0.7rem; border-top: var(--stroke) solid var(--text); margin-top: 80px; }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .lb-modal { position: relative; width: fit-content; max-width: 70vw; height: fit-content; max-height: 85vh; display: flex; align-items: center; justify-content: center; }
        .lb-modal img { max-width: 100%; max-height: 85vh; border: var(--stroke) solid black; background: white; }
        .lb-close { position: fixed; top: 30px; right: 30px; font-size: 1.2rem; color: var(--orange); cursor: pointer; font-family: sans-serif; border: none; background: none; }
        .lb-nav-zone { position: fixed; top: 0; height: 100%; width: 50%; display: flex; align-items: center; cursor: pointer; }
        .lb-dots { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; opacity: 0.3; }
        .dot.active { opacity: 1; background: var(--orange); transform: scale(1.6); }

        #game-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .game-token { position: fixed; width: var(--grid-size); height: var(--grid-size); display: flex; align-items: center; justify-content: center; font-family: 'SpaceMono'; font-weight: 700; font-size: 1.2rem; animation: tokenIn 0.3s forwards; }

        @media (max-width: 1100px) {
            aside { display: none; } header { display: flex; }
            main { margin-left: 0; width: 100%; margin-top: var(--header-h-mobile); }
            .hero-modular { flex-direction: column; height: auto; align-items: flex-start; }
            .hero-box { height: auto; padding: 20px 0; }
            .project-row { flex-direction: column !important; height: auto; border-bottom: var(--stroke) solid var(--text) !important; margin-top: 80px !important; border-top: var(--stroke) solid var(--text) !important; }
            .project-text, .slider-container { width: 100%; height: auto; border: none !important; }
            .project-text { order: 1; padding: 40px 25px; border-bottom: var(--stroke) solid var(--text) !important; min-height: 350px; }
            .slider-container { order: 2; height: 450px; }
            footer { justify-content: center; margin-top: 80px !important; }
        }
    </style>
</head>
<body>
    <div id="game-layer"></div>
    <header><img src="logo.svg" alt="sofra" class="mobile-logo-img"><div class="header-controls"><div class="lang-switch" onclick="toggleLang()"><span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span></div><button id="info-btn" onclick="togglePopup()">[info]</button></div></header>
    <div id="mobile-popup"><div class="sidebar-info-container"></div></div>
    <aside><div class="desktop-logo-frame" onclick="window.scrollTo({top:0, behavior:'smooth'})"><img src="logo.svg" alt="sofra" class="logo-img"></div><div class="sidebar-content"><div class="sidebar-info-container"></div></div></aside>
    <main>
        <div class="meta-strip"><div id="header-log-tag"></div><div class="lang-switch" onclick="toggleLang()"><span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span></div><span id="clock">00:00:00</span></div>
        <section class="hero-modular" id="hero-boxes"></section>
        <div id="project-feed"></div>
        <footer><span id="footer-status"></span><span id="footer-copy"></span><span id="coords">x: 000 y: 000</span></footer>
    </main>
    <div id="lightbox" onclick="closeLightbox()"><div class="lb-modal" onclick="event.stopPropagation()"><button class="lb-close" onclick="closeLightbox()">✕</button><img id="lightbox-img" src=""><div class="lb-controls"><div class="lb-nav-zone" style="left:0" onclick="changeLightbox(-1)"></div><div class="lb-nav-zone" style="right:0" onclick="changeLightbox(1)"></div><div class="lb-dots" id="lb-dots"></div></div></div></div>

    <script>
        if (history.scrollRestoration) { history.scrollRestoration = 'manual'; } window.scrollTo(0, 0);
        let globalContent = { info: null, header: null, footer: null };
        let currentLang = 'en'; let currentPlayer = 'x'; let board = {}; let gameActive = true;
        let projectList = []; let lbState = { project: null, index: 0 };

        async function loadSiteData() {
            try {
                const [info, header, footer] = await Promise.all([
                    fetch('content_info.json').then(r => r.json()),
                    fetch('content_header.json').then(r => r.json()),
                    fetch('content_footer.json').then(r => r.json())
                ]);
                globalContent = { info, header, footer };
                updateUI(); initFeed();
            } catch (e) { console.error("JSON Error", e); }
        }

        function updateUI() {
            const lang = currentLang; const info = globalContent.info; if (!info) return;
            if(info.hero_boxes) document.getElementById('hero-boxes').innerHTML = info.hero_boxes.map(box => `<div class="hero-box"><span>${box[lang]}</span></div>`).join('');
            let html = info.sections.map(section => {
                let content = '';
                if (section.type === 'text') content = section.content.map(p => `<p class="txt-light">${p[lang]}</p>`).join('');
                else if (section.type === 'team') content = section.members.map(m => `<div style="margin-bottom:25px"><span class="txt-medium">${m.name}</span><span class="profession">${m.profession[lang]}</span><p class="bio txt-light">${m.bio[lang]}</p></div>`).join('');
                else if (section.type === 'contact') content = `<div style="margin-bottom:25px"><span class="txt-medium">${section.office_name[lang]}</span><p class="txt-light">${section.address}</p></div>${section.socials.map(s => `<a href="${s.url}" target="_blank" class="contact-link">${s.label}</a>`).join('')}`;
                return `<div class="sidebar-section"><h3>${section.title[lang]}</h3>${content}</div>`;
            }).join('');
            document.querySelectorAll('.sidebar-info-container').forEach(el => el.innerHTML = html);
            if (globalContent.header) {
                document.getElementById('header-log-tag').innerText = globalContent.header.log_version[lang];
                document.getElementById('info-btn').innerText = document.getElementById('mobile-popup').style.display === 'block' ? globalContent.header.close_label : globalContent.header.info_label;
            }
            if (globalContent.footer) {
                document.getElementById('footer-status').innerText = globalContent.footer.system_status;
                document.getElementById('footer-copy').innerText = globalContent.footer.copyright;
            }
        }

        async function probeImage(f, i) {
            for (const ext of ['jpg', 'jpeg', 'png', 'webp']) {
                const url = `images/${f}/${i}.${ext}`;
                const exists = await new Promise(res => { const img = new Image(); img.onload = () => res(true); img.onerror = () => res(false); img.src = url; });
                if (exists) return url;
            } return null;
        }

        async function initFeed() {
            const feed = document.getElementById('project-feed');
            for (let pNum = 1; pNum <= 20; pNum++) {
                const folder = `project${pNum}`; const firstImg = await probeImage(folder, 1);
                if (firstImg) {
                    let meta = { tag: `[log_0${pNum}]`, title: `project_log_${pNum}`, en: `Investigation.`, tr: `İnceleme.`, specs: `Loc: TR // 2025` };
                    try { const res = await fetch(`images/${folder}/meta.json`); if (res.ok) meta = await res.json(); } catch (e) {}
                    let imgs = [firstImg]; for (let iNum = 2; iNum <= 15; iNum++) { const path = await probeImage(folder, iNum); if (path) imgs.push(path); else break; }
                    projectList.push({ id: pNum, meta, imgs, cur: 0 });
                    const row = document.createElement('section'); row.className = 'project-row';
                    row.innerHTML = `<div class="project-text"><div class="mono" style="margin-bottom:10px;">${meta.tag}</div><h2 class="txt-medium" style="font-size:4.5vw; line-height:0.9; margin-bottom:25px;">${meta.title}</h2><p class="txt-light" style="margin-bottom:30px;">${currentLang === 'en' ? meta.en : meta.tr}</p><div style="font-family:'SpaceMono'; font-size:0.65rem; opacity:0.5; border-top:1px solid rgba(0,0,0,0.1); padding-top:15px;">${meta.specs}</div></div><div class="slider-container" id="slider-${pNum}"><div class="slider-track" onclick="openLightbox(${pNum})">${imgs.map(s => `<img src="${s}" class="slide-img">`).join('')}</div>${imgs.length > 1 ? `<div class="nav-zone" style="left:0" onclick="moveSlide(${pNum}, -1, event)"><div class="nav-triangle">◀</div></div><div class="nav-zone" style="right:0" onclick="moveSlide(${pNum}, 1, event)"><div class="nav-triangle">▶</div></div>` : ''}</div>`;
                    feed.appendChild(row);
                }
            }
        }

        function moveSlide(id, dir, e) { if(e) e.stopPropagation(); const p = projectList.find(x => x.id === id); const container = document.getElementById(`slider-${id}`); const track = container.querySelector('.slider-track'); p.cur = (p.cur + dir + p.imgs.length) % p.imgs.length; track.style.transform = `translateX(-${p.cur * 100}%)`; }
        function openLightbox(id) { if (window.innerWidth < 1100) return; const p = projectList.find(x => x.id === id); lbState = { project: p, index: p.cur }; updateLightbox(); document.getElementById('lightbox').style.display = 'flex'; }
        function updateLightbox() { const p = lbState.project; document.getElementById('lightbox-img').src = p.imgs[lbState.index]; document.getElementById('lb-dots').innerHTML = p.imgs.length > 1 ? p.imgs.map((_, i) => `<div class="dot ${i === lbState.index ? 'active' : ''}"></div>`).join('') : ''; }
        function changeLightbox(dir) { lbState.index = (lbState.index + dir + lbState.project.imgs.length) % lbState.project.imgs.length; updateLightbox(); }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        function toggleLang() { currentLang = currentLang === 'en' ? 'tr' : 'en'; document.querySelectorAll('.en-toggle').forEach(el => el.classList.toggle('active', currentLang === 'en')); document.querySelectorAll('.tr-toggle').forEach(el => el.classList.toggle('active', currentLang === 'tr')); updateUI(); projectList.forEach(p => { const row = document.getElementById(`slider-${p.id}`).closest('.project-row'); const desc = row.querySelector('.txt-light'); if (desc) desc.innerText = currentLang === 'en' ? p.meta.en : p.meta.tr; }); }
        function togglePopup() { const p = document.getElementById('mobile-popup'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; updateUI(); }
        window.addEventListener('mousedown', (e) => { if (!gameActive || e.button === 1 || e.target.closest('aside, header, button, .nav-zone, #lightbox')) return; const col = Math.floor(e.clientX / 40); const row = Math.floor(e.clientY / 40); const key = `${col},${row}`; if (!board[key]) { board[key] = currentPlayer; const t = document.createElement('div'); t.className = 'game-token'; t.innerText = currentPlayer; t.style.position = 'fixed'; t.style.left = (col * 40) + 'px'; t.style.top = (row * 40) + 'px'; t.style.color = currentPlayer === 'x' ? 'var(--orange)' : 'black'; t.dataset.coord = key; document.getElementById('game-layer').appendChild(t); const winPath = checkWin(col, row, currentPlayer); if (winPath) { gameActive = false; winPath.forEach(coords => { const el = document.querySelector(`[data-coord="${coords[0]},${coords[1]}"]`); if (el) el.style.animation = 'winPulse 0.4s infinite alternate'; }); } else currentPlayer = (currentPlayer === 'x') ? 'o' : 'x'; } });
        function checkWin(c, r, p) { const dirs = [[1,0], [0,1], [1,1], [1,-1]]; for (let [dx, dy] of dirs) { let path = [[c, r]]; for (let i = 1; i < 3; i++) { if (board[`${c+(dx*i)},${r+(dy*i)}`] === p) path.push([c+(dx*i), r+(dy*i)]); else break; } for (let i = 1; i < 3; i++) { if (board[`${c-(dx*i)},${r-(dy*i)}`] === p) path.push([c-(dx*i), r-(dy*i)]); else break; } if (path.length >= 3) return path; } return null; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        window.addEventListener('mousemove', (e) => { document.getElementById('coords').innerText = `x: ${String(e.clientX).padStart(3, '0')} y: ${String(e.clientY).padStart(3, '0')}`; });
        loadSiteData();
    </script>
</body>
</html>
