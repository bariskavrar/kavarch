<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>sofra — built different.</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        @font-face { font-family: 'FuturaLTPro'; src: url('FuturaLTPro-Light.woff2') format('woff2'); font-weight: 300; }
        @font-face { font-family: 'FuturaLTPro'; src: url('FuturaLTPro-Book.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'FuturaLTPro'; src: url('FuturaLTPro-Medium.woff2') format('woff2'); font-weight: 500; }
        @font-face { font-family: 'FuturaLTPro'; src: url('FuturaLTPro-SemiBold.woff2') format('woff2'); font-weight: 600; }
        @font-face { font-family: 'SpaceMonoCustom'; src: url('SpaceMono-Regular.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'SpaceMonoCustom'; src: url('SpaceMono-Bold.woff2') format('woff2'); font-weight: 700; }

        :root {
            --bg: #ffffff; --text: #000000; --orange: #ff5500; 
            --grid-size: 40px; --grid-line: rgba(0, 0, 0, 0.12); --grid-line-white: rgba(255, 255, 255, 0.1);
            --sidebar-w: 480px; --header-h-mobile: 120px; --stroke: 2px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: lowercase !important; -webkit-font-smoothing: antialiased; font-variant-ligatures: none !important; font-feature-settings: "liga" 0 !important; }
        body { font-family: 'FuturaLTPro', Arial, sans-serif; color: var(--text); background-color: var(--bg); cursor: crosshair; overflow-x: hidden; }

        body::before { content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none; background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); background-size: var(--grid-size) var(--grid-size); }

        aside { width: var(--sidebar-w); height: 100vh; position: fixed; left: 0; top: 0; border-right: var(--stroke) solid var(--text); background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); display: flex; flex-direction: column; z-index: 100; }
        .desktop-logo-frame { width: 100%; height: 200px !important; border-bottom: var(--stroke) solid var(--text); display: flex; align-items: center; justify-content: center; background: white; transition: 0.2s; cursor: pointer; }
        .desktop-logo-frame:hover { background: var(--orange); }
        .desktop-logo-frame:hover .logo-img { filter: invert(1) brightness(10); }
        .logo-img { height: 50px; width: auto; transition: 0.2s; letter-spacing: -0.025em; }

        .sidebar-content, #mobile-popup { padding: var(--grid-size); flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .sidebar-content::-webkit-scrollbar, #mobile-popup::-webkit-scrollbar { display: none; }
        .sidebar-section { margin-bottom: 40px; }
        .sidebar-section h3 { margin-bottom: 10px; font-family: "SpaceMonoCustom", monospace; font-size: 0.7rem; font-weight: 700 !important; color: var(--orange); letter-spacing: 2px; }
        .txt-medium { font-weight: 400; font-size: 1rem; text-align: left; }
        .txt-light { font-weight: 300; font-size: 1rem; line-height: 1.5; text-align: left; }
        .contact-link { display: block; margin-top: 5px; text-decoration: underline !important; color: black !important; font-weight: 400; }

        .hero-modular { display: flex; width: 100%; height: 640px; border-bottom: var(--stroke) solid var(--text); padding: var(--grid-size); gap: var(--grid-size); align-items: flex-end; }
        .hero-box { flex: 1; height: 50%; display: flex; align-items: flex-end; padding-bottom: 20px; }
        .hero-box span { font-family: "SpaceMonoCustom", monospace; font-size: 1.2rem; color: var(--orange); font-weight: 400; line-height: 1.1; text-transform: uppercase !important; display: inline-block; min-height: 1.2em; }

        header { display: none; position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h-mobile); background: white; border-bottom: var(--stroke) solid var(--text); z-index: 3000; padding: 0; justify-content: space-between; align-items: center; }
        .mobile-logo-img { height: 35px; width: auto; margin-left: 25px; }
        .header-controls { display: flex; align-items: center; gap: 20px; height: 100%; }
        #info-btn { background: var(--orange); color: white; border: none; height: 100%; width: 100px; font-family: 'SpaceMonoCustom'; font-weight: 700; border-left: var(--stroke) solid var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #mobile-popup { display: none; position: fixed; top: var(--header-h-mobile); left: 0; width: 100%; height: calc(100vh - var(--header-h-mobile)); background: white; z-index: 2000; padding: 40px 25px; padding-bottom: 120px; }

        main { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); position: relative; z-index: 5; background: transparent; }
        .meta-strip { height: 80px; padding: 0 var(--grid-size); border-bottom: var(--stroke) solid var(--text); background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px); display: flex; justify-content: space-between; align-items: center; font-family: 'SpaceMonoCustom'; font-size: 0.7rem; position: sticky; top: 0; z-index: 50; }

        .updates-container { display: flex; height: 400px; border-bottom: var(--stroke) solid var(--text); background: black; }
        .video-box { position: relative; width: 50%; height: 100%; overflow: hidden; border-right: var(--stroke) solid var(--text); }
        .video-box:last-child { border-right: none; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; opacity: 0.8; }
        .video-box:hover video { filter: grayscale(0); opacity: 1; }
        .tag { position: absolute; bottom: 20px; left: 20px; background: var(--orange); color: white; padding: 4px 12px; font-family: 'SpaceMonoCustom'; font-size: 0.6rem; z-index: 10; }

        .project-row { display: flex; width: 100%; height: 550px; border-bottom: var(--stroke) solid var(--text); background: transparent; align-items: stretch; margin-top: 80px; }
        #project-feed .project-row:first-child { margin-top: 0; border-top: none; }
        #project-feed .project-row:not(:first-child) { border-top: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) { flex-direction: row-reverse; }
        .project-text { width: 50%; padding: var(--grid-size); background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(2px); display: flex; flex-direction: column; justify-content: center; }
        .project-row:nth-of-type(odd) .project-text { border-right: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) .project-text { border-left: var(--stroke) solid var(--text); }
        .slider-container { width: 50%; position: relative; background: #eee; overflow: hidden; touch-action: pan-y; }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; }
        .slide-img { min-width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; }
        .slider-container:hover .slide-img { filter: grayscale(0); }
        .nav-zone { width: 60px; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; cursor: pointer; position: absolute; top:0; z-index: 10; }
        .slider-container:hover .nav-zone { opacity: 1; }
        .nav-triangle { color: var(--orange); font-size: 1.5rem; }
        
        footer { padding: var(--grid-size); background: white; display: flex; justify-content: space-between; font-family: 'SpaceMonoCustom'; font-size: 0.7rem; border-top: var(--stroke) solid var(--text); margin-top: 80px; }

        @media (max-width: 1100px) {
            aside { display: none; } header { display: flex; }
            main { margin-left: 0; width: 100%; margin-top: var(--header-h-mobile); }
            .updates-container { flex-direction: column; height: auto; }
            .updates-container .video-box { width: 100%; height: 300px; border-right: none; border-bottom: var(--stroke) solid var(--text); }
            .hero-modular { flex-direction: column; height: auto; align-items: flex-start; }
            .hero-box { height: auto; padding: 20px 0; }
            .project-row { flex-direction: column !important; height: auto; border-bottom: var(--stroke) solid var(--text) !important; margin-top: 80px !important; border-top: var(--stroke) solid var(--text) !important; }
            .project-text, .slider-container { width: 100%; height: auto; border: none !important; }
            .project-text { order: 1; padding: 40px 25px; border-bottom: var(--stroke) solid var(--text) !important; min-height: 350px; }
            .slider-container { order: 2; height: 450px; }
            footer { justify-content: center; margin-top: 80px !important; }
        }
    </style>
</head>
<body>
    <div id="game-layer"></div>
    <header><img src="logo.svg" alt="sofra" class="mobile-logo-img"><div class="header-controls"><div class="lang-switch" onclick="toggleLang()"><span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span></div><button id="info-btn" onclick="togglePopup()">[info]</button></div></header>
    <div id="mobile-popup"><div class="sidebar-info-container"></div></div>
    <aside><div class="desktop-logo-frame" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><img src="logo.svg" alt="sofra" class="logo-img"></div><div class="sidebar-content"><div class="sidebar-info-container"></div></div></aside>
    <main>
        <div class="meta-strip"><div id="header-log-tag"></div><div class="lang-switch" onclick="toggleLang()"><span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span></div><span id="clock" style="font-family: 'SpaceMonoCustom'; font-size: 0.7rem;">00:00:00</span></div>
        <section class="updates-container">
            <div class="video-box"><video autoplay muted loop playsinline><source src="videos/video1.mp4" type="video/mp4"></video><div class="tag"><span>log_01: site_friction</span></div></div>
            <div class="video-box"><video autoplay muted loop playsinline><source src="videos/video2.mp4" type="video/mp4"></video><div class="tag"><span>log_02: structural_void</span></div></div>
        </section>
        <section class="hero-modular" id="hero-boxes"></section>
        <div id="project-feed"></div>
        <footer><span id="footer-status"></span><span id="footer-copy"></span><span id="coords">x: 000 y: 000</span></footer>
    </main>

    <script>
        if (history.scrollRestoration) { history.scrollRestoration = 'manual'; } window.scrollTo(0, 0);

        const DECRYPT_STAGGER = 3; 
        const SYMBOLS = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789#@&*<>/[]{}';

        // Reusable Decrypt Animation Function
        function decryptEffect(el, targetText) {
            const text = targetText.toUpperCase();
            let frame = 0;
            function update() {
                const progress = Math.floor(frame / DECRYPT_STAGGER);
                const result = text.split('').map((char, i) => {
                    if (char === ' ') return ' ';
                    if (i < progress) return char;
                    return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                }).join('');
                el.innerText = result;
                if (progress < text.length) { frame++; requestAnimationFrame(update); }
            }
            update();
        }

        let globalContent = { info: null, header: null, footer: null };
        let currentLang = 'en'; let board = {}; let gameActive = true;

        async function loadSiteData() {
            try {
                const [info, header, footer] = await Promise.all([
                    fetch('content_info.json').then(r => r.json()),
                    fetch('content_header.json').then(r => r.json()),
                    fetch('content_footer.json').then(r => r.json())
                ]);
                globalContent = { info, header, footer };
                updateUI(true); // true means run animation
                initFeed();
            } catch (e) { console.error("Data Load Error", e); }
        }

        function updateUI(animateHero = false) {
            const lang = currentLang; const info = globalContent.info; if (!info) return;

            // Hero Boxes Animation
            if(info.hero_boxes) {
                const heroCont = document.getElementById('hero-boxes');
                heroCont.innerHTML = info.hero_boxes.map(() => `<div class="hero-box"><span></span></div>`).join('');
                const spans = heroCont.querySelectorAll('span');
                info.hero_boxes.forEach((box, i) => {
                    if(animateHero) decryptEffect(spans[i], box[lang]);
                    else spans[i].innerText = box[lang].toUpperCase();
                });
            }

            // Modular JSON Renderer
            let html = info.sections.map(section => {
                let content = '';
                if (section.type === 'text') content = section.content.map(p => `<p class="txt-light">${p[lang]}</p>`).join('');
                else if (section.type === 'team') content = section.members.map(m => `<div style="margin-bottom:25px"><span class="txt-medium">${m.name}</span><span class="profession">${m.profession[lang]}</span><p class="bio txt-light">${m.bio[lang]}</p></div>`).join('');
                else if (section.type === 'contact') content = `<div style="margin-bottom:25px"><span class="txt-medium">${section.office_name[lang]}</span><p class="txt-light">${section.address}</p></div>${section.socials.map(s => `<a href="${s.url}" target="_blank" class="contact-link">${s.label}</a>`).join('')}`;
                return `<div class="sidebar-section"><h3>${section.title[lang]}</h3>${content}</div>`;
            }).join('');

            document.querySelectorAll('.sidebar-info-container').forEach(el => el.innerHTML = html);
            if (globalContent.header) document.getElementById('header-log-tag').innerText = globalContent.header.log_version[lang];
            if (globalContent.footer) {
                document.getElementById('footer-status').innerText = globalContent.footer.system_status;
                document.getElementById('footer-copy').innerText = globalContent.footer.copyright;
            }
        }

        async function probeImage(f, i) {
            for (const ext of ['jpg', 'jpeg', 'png', 'webp']) {
                const url = `images/${f}/${i}.${ext}`;
                const exists = await new Promise(res => { const img = new Image(); img.onload = () => res(true); img.onerror = () => res(false); img.src = url; });
                if (exists) return url;
            } return null;
        }

        async function initFeed() {
            const feed = document.getElementById('project-feed');
            for (let pNum = 1; pNum <= 20; pNum++) {
                const folder = `project${pNum}`; const firstImg = await probeImage(folder, 1);
                if (firstImg) {
                    let meta = { tag: `[log_0${pNum}]`, title: `project_log_${pNum}`, en: `Case study.`, tr: `Vaka çalışması.`, specs: `Loc: TR // 2025` };
                    try { const res = await fetch(`images/${folder}/meta.json`); if (res.ok) meta = await res.json(); } catch (e) {}
                    const row = document.createElement('section'); row.className = 'project-row';
                    row.innerHTML = `<div class="project-text"><div class="sidebar-section"><h3>${meta.tag}</h3></div><h2 class="txt-medium" style="font-size:4.5vw; line-height:0.9; margin-bottom:25px; font-weight:400;">${meta.title}</h2><p class="txt-light" style="margin-bottom:30px;">${currentLang === 'en' ? meta.en : meta.tr}</p><div style="font-family:'SpaceMonoV5'; font-size:0.65rem; opacity:0.5; border-top:1px solid rgba(0,0,0,0.1); padding-top:15px;">${meta.specs}</div></div><div class="slider-container"><img src="${firstImg}" class="slide-img"></div>`;
                    feed.appendChild(row);
                }
            }
        }

        function toggleLang() { currentLang = currentLang === 'en' ? 'tr' : 'en'; document.querySelectorAll('.en-toggle').forEach(el => el.classList.toggle('active', currentLang === 'en')); document.querySelectorAll('.tr-toggle').forEach(el => el.classList.toggle('active', currentLang === 'tr')); updateUI(false); }
        function togglePopup() { const p = document.getElementById('mobile-popup'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        loadSiteData();
    </script>
</body>
</html>
