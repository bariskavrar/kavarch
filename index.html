<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>kavarch — built different.</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --orange: #ff5500; 
            --grid-size: 40px; 
            --grid-line: rgba(0, 0, 0, 0.12);
            --sidebar-w: 400px; 
            --header-h-mobile: 120px;
            --stroke: 2px;
            --row-h-desktop: 550px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: lowercase !important; -webkit-font-smoothing: antialiased; }
        html, body { width: 100%; background-color: var(--bg); margin: 0; padding: 0; }

        body { 
            font-family: 'Jost', sans-serif; color: var(--text); cursor: crosshair;
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size); background-attachment: fixed;
            display: block;
        }

        .logo-text { letter-spacing: -2px; line-height: 1; color: black !important; text-decoration: none !important; display: inline-block; }
        .logo-text .kav { font-weight: 600; } .logo-text .arch { font-weight: 300; }

        .lang-switch { 
            font-family: 'Space Mono', monospace; font-size: 0.7rem; 
            display: inline-flex; align-items: baseline; cursor: pointer; user-select: none;
            padding: 10px 0; 
        }
        .lang-btn { opacity: 0.2; transition: 0.3s; pointer-events: none; }
        .lang-btn.active { opacity: 1; color: var(--orange); font-weight: 700; }
        .lang-switch .slash { opacity: 0.2; margin: 0 1px; pointer-events: none; }

        aside {
            width: var(--sidebar-w); height: 100vh; position: fixed; left: 0; top: 0;
            border-right: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; z-index: 100;
        }
        .desktop-logo-frame {
            width: 100%; height: 180px; border-bottom: var(--stroke) solid var(--text);
            display: flex; align-items: center; justify-content: center; font-size: 3.8rem;
            transition: 0.2s; cursor: pointer; background: white;
        }
        .desktop-logo-frame:hover { background: var(--orange); }
        .desktop-logo-frame:hover .logo-text, .desktop-logo-frame:hover .logo-text span { color: white !important; }

        .sidebar-content { padding: var(--grid-size); flex-grow: 1; overflow-y: auto; }
        .sidebar-section { margin-bottom: 40px; }
        .sidebar-section h3 { margin-bottom: 15px; color: var(--orange); font-family: 'Space Mono', monospace; font-size: 0.7rem; }
        .sidebar-section p { font-size: 1rem; line-height: 1.5; font-weight: 300; }
        
        .name-style { font-size: 1.1rem; display: block; font-weight: 500; margin-bottom: 4px; }
        .team-member-block { margin-bottom: 25px; }
        .team-member-block .profession { font-size: 0.8rem; display: block; margin-bottom: 6px; opacity: 0.6; }
        .team-member-block .bio { font-size: 0.9rem; opacity: 0.8; line-height: 1.4; font-weight: 300; }
        .contact-link { display: block; margin-top: 5px; text-decoration: underline !important; color: black; font-weight: 500; }

        header {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h-mobile);
            background: white; border-bottom: var(--stroke) solid var(--text); z-index: 3000;
            padding: 0 0 0 25px; justify-content: space-between; align-items: center;
        }

        #info-btn { 
            background: var(--orange); color: white; border: none; height: 100%; width: 100px; 
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.8rem; 
            border-left: var(--stroke) solid var(--text); cursor: pointer;
        }
        #mobile-popup { display: none; position: fixed; top: var(--header-h-mobile); left: 0; width: 100%; height: calc(100vh - var(--header-h-mobile)); background: white; z-index: 2000; padding: 40px 25px; overflow-y: auto; }

        main { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); position: relative; z-index: 5; }

        .meta-strip {
            height: 80px; padding: 0 var(--grid-size); border-bottom: var(--stroke) solid var(--text); 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Space Mono', monospace; font-size: 0.7rem; position: sticky; top: 0; z-index: 50;
        }

        #header-log-tag { color: var(--text); font-weight: 400; }

        #game-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .game-token { 
            position: absolute; width: var(--grid-size); height: var(--grid-size); 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 1.2rem; 
        }
        @keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.3); color: var(--orange) !important; } }

        .updates-container { display: flex; height: 400px; border-bottom: var(--stroke) solid var(--text); background: black; }
        .video-box { position: relative; width: 50%; height: 100%; overflow: hidden; }
        .video-box:first-child { border-right: var(--stroke) solid var(--text); }
        .video-box video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; opacity: 0.8; }
        .video-box:hover video { filter: grayscale(0); opacity: 1; transform: scale(1.05); }
        .tag { position: absolute; bottom: 20px; left: 20px; background: var(--orange); color: white; padding: 4px 12px; font-family: 'Space Mono'; font-size: 0.6rem; z-index: 10; }

        .hero { padding: 120px var(--grid-size); border-bottom: var(--stroke) solid var(--text); }
        .hero h1 { font-size: 11vw; font-weight: 500; line-height: 0.85; letter-spacing: -0.05em; pointer-events: none; }

        #project-feed { min-height: 500px; }
        .project-row { display: flex; width: 100%; height: var(--row-h-desktop); border-bottom: var(--stroke) solid var(--text); align-items: stretch; }
        .project-row:nth-of-type(even) { flex-direction: row-reverse; }
        .project-text, .slider-container { width: 50%; display: flex; flex-direction: column; justify-content: center; }
        .project-text { padding: var(--grid-size); }
        .project-row:nth-of-type(odd) .project-text { border-right: var(--stroke) solid var(--text); }
        .project-row:nth-of-type(even) .project-text { border-left: var(--stroke) solid var(--text); }
        .project-meta { color: var(--orange); font-family: 'Space Mono'; font-weight: 700; font-size: 0.7rem; margin-bottom: 15px; }

        .slider-container { position: relative; background: #eee; overflow: hidden; }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-img { min-width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s; }
        .slider-nav { position: absolute; inset: 0; display: flex; z-index: 10; }
        .nav-zone { width: 50%; height: 100%; display: flex; align-items: center; opacity: 0; transition: 0.3s; cursor: pointer; padding: 20px;}
        .nav-zone:hover { opacity: 1; }
        .nav-label { background: var(--orange); color: white; font-family: 'Space Mono'; padding: 10px; font-weight: 700; font-size: 0.8rem; }
        .nav-zone.right { justify-content: flex-end; }

        footer { padding: var(--grid-size); display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.7rem; border-top: var(--stroke) solid var(--text); }

        @media (max-width: 1100px) {
            aside { display: none; } header { display: flex; }
            main { margin-left: 0; margin-top: var(--header-h-mobile); }
            .project-row { flex-direction: column !important; height: auto; }
            .project-text, .slider-container { width: 100%; }
            .slider-container { height: 400px; border-top: var(--stroke) solid var(--text); }
        }
    </style>
</head>
<body>

    <div id="game-layer"></div>

    <header>
        <div class="mobile-logo logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        <div class="header-controls">
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <button id="info-btn" onclick="togglePopup()">[info]</button>
        </div>
    </header>

    <div id="mobile-popup"><div class="sidebar-info-container"></div></div>

    <aside>
        <div class="desktop-logo-frame" onclick="window.scrollTo(0,0)">
            <div class="logo-text"><span class="kav">kav</span><span class="arch">arch</span></div>
        </div>
        <div class="sidebar-content"><div class="sidebar-info-container"></div></div>
    </aside>

    <main>
        <div class="meta-strip">
            <div id="header-log-tag" class="mono"></div>
            <div class="lang-switch" onclick="toggleLang()">
                <span class="lang-btn active en-toggle">en</span><span class="slash">/</span><span class="lang-btn tr-toggle">tr</span>
            </div>
            <span id="clock" class="mono">00:00:00</span>
        </div>

        <section class="updates-container">
            <div class="video-box">
                <video autoplay muted loop playsinline><source src="videos/video1.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_01: site_friction</span></div>
            </div>
            <div class="video-box">
                <video autoplay muted loop playsinline><source src="videos/video2.mp4" type="video/mp4"></video>
                <div class="tag"><span>log_02: structural_void</span></div>
            </div>
        </section>

        <section class="hero">
            <h1>built<br><span style="color: var(--orange);">different.</span></h1>
        </section>

        <div id="project-feed"></div>

        <footer>
            <span id="footer-status"></span>
            <span id="footer-copy"></span>
            <span id="coords">x: 000 y: 000</span>
        </footer>
    </main>

    <script>
        let globalContent = { info: null, header: null, footer: null };
        let currentLang = 'en';
        let gameActive = true;

        async function loadDynamicContent() {
            try {
                // We use cache-busting to ensure we always get latest json
                const [info, header, footer] = await Promise.all([
                    fetch('content_info.json?v=' + Date.now()).then(r => r.json()),
                    fetch('content_header.json?v=' + Date.now()).then(r => r.json()),
                    fetch('content_footer.json?v=' + Date.now()).then(r => r.json())
                ]);
                globalContent = { info, header, footer };
                updateUI();
            } catch (e) { 
                console.error("JSON Error: Make sure you are running a local server and files exist.", e); 
            }
        }

        function updateUI() {
            const lang = currentLang;
            const info = globalContent.info;
            if (!info) return;

            let html = `
                <div class="sidebar-section">
                    <h3>01_about</h3>
                    <p class="light">${info.about[lang]}</p>
                </div>
                <div class="sidebar-section">
                    <h3>02_team</h3>
                    ${info.team.map(m => `
                        <div class="team-member-block">
                            <span class="name-style med">${m.name}</span>
                            <span class="profession light">${m.profession[lang]}</span>
                            <p class="bio light">${m.bio[lang]}</p>
                        </div>
                    `).join('')}
                </div>
                <div class="sidebar-section">
                    <h3>03_contact</h3>
                    ${info.contact.map(office => `
                        <div class="office-block">
                            <span class="name-style med">${office.title[lang]}</span>
                            <p class="light">${office.address}</p>
                        </div>
                    `).join('')}
                </div>
                <div class="sidebar-section">
                    <h3>04_socials</h3>
                    ${info.socials.map(soc => `
                        <a href="${soc.url}" target="_blank" class="contact-link med">${soc.label}</a>
                    `).join('')}
                </div>
            `;
            document.querySelectorAll('.sidebar-info-container').forEach(el => el.innerHTML = html);

            if (globalContent.header && gameActive) {
                document.getElementById('header-log-tag').innerText = globalContent.header.log_version[lang];
                const infoBtn = document.getElementById('info-btn');
                const isVisible = document.getElementById('mobile-popup').style.display === 'block';
                infoBtn.innerText = isVisible ? globalContent.header.close_label : globalContent.header.info_label;
            }
            if (globalContent.footer) {
                document.getElementById('footer-status').innerText = globalContent.footer.system_status;
                document.getElementById('footer-copy').innerText = globalContent.footer.copyright;
            }
        }

        // SLIDER / FEED Logic
        const EXTENSIONS = ['jpg', 'jpeg', 'png', 'webp', 'gif'];
        async function probeImage(folder, index) {
            for (const ext of EXTENSIONS) {
                const url = `images/${folder}/${index}.${ext}`;
                const exists = await new Promise(res => {
                    const img = new Image
